<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root{
  --green-900:#1f5e2f;
  --green-700:#2f8f43;
  --green-600:#3aa757;
  --green-500:#56c271;
  --green-300:#a6e6b6;
  --green-100:#e4f7e9;
  --green-050:#f1fbf4;
  --mint:#d7f3df;
  --bubble-me:#caf2d3;
  --bubble-them:#ffffff;
  --ink:#13351c;
  --ink-soft:#4a6b54;
  --line:#d6ecdc;
  --white:#ffffff;
  --danger:#e2574c;
  --shadow:0 8px 28px rgba(33,94,47,.16);
  --shadow-sm:0 3px 10px rgba(33,94,47,.12);
  --radius:20px;
  --font-d:"Baloo 2",system-ui,sans-serif;
  --font-b:"Nunito",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
body{
  font-family:var(--font-b);
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at -10% -10%, var(--green-100), transparent 60%),
    radial-gradient(900px 500px at 110% 110%, var(--mint), transparent 60%),
    var(--green-050);
  overflow:hidden;
}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none}
input,textarea{font-family:var(--font-b)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--green-300);border-radius:20px}
::-webkit-scrollbar-track{background:transparent}

/* chat print background */
.print-bg{
  background-color:var(--green-050);
  background-image:
    radial-gradient(circle at 20% 30%, rgba(86,194,113,.10) 0 6px, transparent 7px),
    radial-gradient(circle at 70% 60%, rgba(86,194,113,.08) 0 10px, transparent 11px),
    radial-gradient(circle at 45% 80%, rgba(58,167,87,.07) 0 4px, transparent 5px),
    radial-gradient(circle at 85% 20%, rgba(58,167,87,.06) 0 8px, transparent 9px);
  background-size:140px 140px,200px 200px,160px 160px,180px 180px;
}

#app{height:100%;display:flex;flex-direction:column}

/* ---------- AUTH ---------- */
.auth-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:18px}
.auth-card{
  width:100%;max-width:420px;background:var(--white);border-radius:28px;
  padding:30px 26px;box-shadow:var(--shadow);text-align:center;
  border:1px solid var(--line);
}
.logo-egg{font-size:64px;line-height:1;filter:drop-shadow(0 6px 8px rgba(58,167,87,.25))}
.brand{font-family:var(--font-d);font-weight:800;font-size:38px;color:var(--green-700);margin:6px 0 2px}
.brand span{color:var(--green-500)}
.subtitle{color:var(--ink-soft);margin:0 0 22px;font-weight:600}
.field{margin:10px 0;text-align:left}
.field label{font-size:13px;font-weight:700;color:var(--ink-soft);margin-left:6px}
.inp{
  width:100%;padding:14px 16px;border:2px solid var(--line);border-radius:16px;
  font-size:16px;background:var(--green-050);outline:none;color:var(--ink);transition:.15s;
}
.inp:focus{border-color:var(--green-500);background:var(--white)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 18px;border-radius:16px;font-weight:800;font-size:16px;
  background:linear-gradient(180deg,var(--green-500),var(--green-600));color:#fff;
  box-shadow:var(--shadow-sm);transition:transform .1s,filter .15s;width:100%;margin-top:14px;
}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--green-100);color:var(--green-700);box-shadow:none}
.btn.mini{width:auto;padding:9px 14px;font-size:14px;border-radius:12px;margin:0}
.btn.danger{background:linear-gradient(180deg,#f0746a,var(--danger))}
.divider{display:flex;align-items:center;gap:10px;color:var(--ink-soft);margin:18px 0;font-size:13px;font-weight:700}
.divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--line)}
.tiny{font-size:12px;color:var(--ink-soft);margin-top:14px;line-height:1.5}

/* ---------- MAIN LAYOUT ---------- */
.shell{height:100%;display:flex;min-height:0}
.sidebar{
  width:340px;min-width:340px;background:var(--white);border-right:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0;
}
.topbar{
  display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--green-600),var(--green-700));color:#fff;
}
.topbar .title{font-family:var(--font-d);font-weight:800;font-size:22px;display:flex;align-items:center;gap:6px}
.iconbtn{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:20px;
  background:rgba(255,255,255,.16);color:#fff;transition:.15s;flex:none;
}
.iconbtn:hover{background:rgba(255,255,255,.3)}
.iconbtn.dark{background:var(--green-100);color:var(--green-700)}
.iconbtn.dark:hover{background:var(--green-300)}
.searchbar{padding:10px 12px;border-bottom:1px solid var(--line)}
.searchbar input{width:100%;padding:11px 14px;border-radius:14px;border:2px solid var(--line);background:var(--green-050);outline:none}
.searchbar input:focus{border-color:var(--green-500)}
.chatlist{flex:1;overflow-y:auto;min-height:0}
.chat-item{display:flex;gap:12px;padding:12px 14px;cursor:pointer;align-items:center;border-bottom:1px solid #eef7f0;transition:.12s}
.chat-item:hover{background:var(--green-050)}
.chat-item.active{background:var(--green-100)}
.avatar{
  width:52px;height:52px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-weight:800;color:#fff;font-size:20px;background:var(--green-500);overflow:hidden;font-family:var(--font-d);
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.ch{border-radius:30% 30% 30% 30%;background:linear-gradient(135deg,#3aa757,#1f5e2f)}
.ci-main{flex:1;min-width:0}
.ci-row{display:flex;justify-content:space-between;align-items:center;gap:6px}
.ci-name{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.ci-time{font-size:11px;color:var(--ink-soft);flex:none}
.ci-last{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.badge{background:var(--green-500);color:#fff;border-radius:20px;font-size:11px;font-weight:800;padding:2px 7px;flex:none}
.pill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:8px;background:var(--green-100);color:var(--green-700)}

/* main chat */
.main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.chat-head{
  display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--white);
  border-bottom:1px solid var(--line);box-shadow:var(--shadow-sm);z-index:5;
}
.chat-head .meta{flex:1;min-width:0}
.chat-head .nm{font-weight:800;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-head .st{font-size:12px;color:var(--green-600);font-weight:700}
.pinned{
  display:none;align-items:center;gap:10px;padding:8px 14px;background:var(--green-050);
  border-bottom:1px solid var(--line);cursor:pointer;
}
.pinned .pl{width:3px;height:30px;background:var(--green-500);border-radius:4px}
.pinned .pt{flex:1;min-width:0}
.pinned .pt b{font-size:12px;color:var(--green-700);display:block}
.pinned .pt span{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}

.messages{flex:1;overflow-y:auto;padding:16px 6vw;min-height:0;display:flex;flex-direction:column;gap:6px}
@media(max-width:760px){.messages{padding:14px 12px}}
.msg{max-width:74%;align-self:flex-start;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.me{align-self:flex-end}
.bubble{
  background:var(--bubble-them);padding:8px 12px 6px;border-radius:16px 16px 16px 5px;
  box-shadow:var(--shadow-sm);position:relative;word-wrap:break-word;
}
.msg.me .bubble{background:var(--bubble-me);border-radius:16px 16px 5px 16px}
.by{font-size:12.5px;font-weight:800;color:var(--green-700);margin-bottom:2px;cursor:pointer}
.bd{font-size:15px;line-height:1.4;white-space:pre-wrap;word-break:break-word}
.mtime{font-size:10px;color:var(--ink-soft);text-align:right;margin-top:2px;display:flex;gap:5px;justify-content:flex-end;align-items:center}
.reply-quote{border-left:3px solid var(--green-500);background:rgba(58,167,87,.08);padding:4px 8px;border-radius:8px;margin-bottom:5px;font-size:13px;cursor:pointer}
.reply-quote b{color:var(--green-700);display:block;font-size:12px}
.reply-quote span{color:var(--ink-soft);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.fwd{font-size:11px;font-style:italic;color:var(--ink-soft);margin-bottom:3px}
.msg img.photo{max-width:260px;border-radius:12px;display:block;cursor:pointer}
.msg video.circle{width:180px;height:180px;border-radius:50%;object-fit:cover;background:#000;display:block}
.msg video.vid{max-width:260px;border-radius:12px}
.voice{display:flex;align-items:center;gap:10px;min-width:200px}
.voice audio{width:200px;height:34px}
.transcript{font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:4px;border-top:1px dashed var(--line);padding-top:4px}
.sticker{font-size:74px;line-height:1}
.sticker img{width:130px;height:130px;object-fit:contain}
.loc{display:block;border-radius:12px;overflow:hidden;width:240px;text-decoration:none;color:inherit;border:1px solid var(--line)}
.loc .map{height:120px;background:linear-gradient(135deg,#bfe9c8,#86d59b);display:grid;place-items:center;font-size:40px;position:relative}
.loc .lbl{padding:8px 10px;background:#fff;font-weight:700;font-size:13px}
.calc-msg{font-family:ui-monospace,monospace;background:#0f1f15;color:#b7f7c6;padding:10px 12px;border-radius:12px;font-size:14px;white-space:pre}
.calc-msg .res{color:#fff;font-weight:800}
pre.code{margin:4px 0 0;border-radius:12px;overflow:auto;font-size:13px;border:1px solid var(--line)}
pre.code code{padding:12px 14px;display:block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.code-lang{font-size:10px;font-weight:800;color:var(--green-700);background:var(--green-100);display:inline-block;padding:1px 7px;border-radius:6px;margin-bottom:3px;text-transform:uppercase}

.poll{min-width:240px}
.poll .q{font-weight:800;margin-bottom:8px}
.poll .opt{background:var(--green-050);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin:5px 0;cursor:pointer;position:relative;overflow:hidden}
.poll .opt .fill{position:absolute;inset:0;background:var(--green-100);width:0;transition:width .4s}
.poll .opt .ot{position:relative;display:flex;justify-content:space-between;font-size:14px;font-weight:600}
.poll .opt.voted{border-color:var(--green-500)}

.reactions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.reactions .r{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:1px 7px;font-size:12px;cursor:pointer}
.reactions .r.mine{background:var(--green-100);border-color:var(--green-500)}

/* long-press context menu */
.ctx-menu{position:fixed;z-index:200;background:#fff;border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;min-width:190px;animation:pop .12s ease}
.ctx-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;font-size:15px;font-weight:700;color:var(--ink);text-align:left;transition:.1s}
.ctx-menu button:hover{background:var(--green-050)}
.ctx-menu button.danger{color:var(--danger)}
.ctx-menu button .k{width:20px;text-align:center;flex:none;font-size:15px}
.ctx-menu .sep{height:1px;background:var(--line)}
.bubble{user-select:none;-webkit-user-select:none}
.bubble.selecting{outline:2px solid var(--green-500)}
/* checkmarks */
.checks{font-size:12px;letter-spacing:-3px;font-weight:900}
.checks.sent{color:var(--ink-soft)}
.checks.delivered{color:var(--ink-soft)}
.checks.read{color:#2196f3}
/* circle recording preview */
.rec-preview{width:120px;height:120px;border-radius:50%;object-fit:cover;background:#000;flex:none}

/* custom voice player */
.vmsg{display:flex;align-items:center;gap:10px;min-width:210px}
.vmsg .vplay{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:17px;background:var(--green-500);color:#fff}
.msg.me .vmsg .vplay{background:var(--green-600)}
.vmsg .vmid{flex:1;min-width:0}
.vmsg .vbar{height:26px;display:flex;align-items:center;cursor:pointer}
.vmsg .vtrack{position:relative;width:100%;height:4px;background:var(--green-300);border-radius:4px}
.vmsg .vfill{position:absolute;left:0;top:0;height:100%;width:0;background:var(--green-600);border-radius:4px}
.vmsg .vdot{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:var(--green-700);left:0}
.vmsg .vtime{font-size:11px;color:var(--ink-soft);font-weight:700;margin-top:3px}
.vmsg .vmic{font-size:15px;flex:none;color:var(--green-600)}

/* ===== CALLS ===== */
.call-overlay{position:fixed;inset:0;z-index:400;background:linear-gradient(160deg,#1f5e2f,#0c2a16);display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:40px 20px;color:#fff}
.call-overlay.open{display:flex}
.call-videos{position:absolute;inset:0;overflow:hidden}
.call-videos video{position:absolute;object-fit:cover}
#remoteVid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0c2a16;z-index:0}
#localVid{width:120px;height:160px;right:16px;top:16px;border-radius:14px;border:2px solid rgba(255,255,255,.5);object-fit:cover;z-index:2;background:#000;position:absolute;transform:scaleX(-1)}
.call-top{position:relative;z-index:3;text-align:center;margin-top:10px}
.call-top .ca{width:110px;height:110px;border-radius:50%;margin:0 auto 14px;display:grid;place-items:center;font-size:44px;font-weight:800;background:rgba(255,255,255,.18);overflow:hidden}
.call-top .ca img{width:100%;height:100%;object-fit:cover}
.call-name{font-family:var(--font-d);font-size:26px;font-weight:800}
.call-status{opacity:.85;margin-top:4px}
.call-actions{position:relative;z-index:3;display:flex;gap:22px;margin-bottom:10px}
.call-btn{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:22px;background:rgba(255,255,255,.2);color:#fff;flex-shrink:0}
.call-btn.hang{background:var(--danger)}
.call-btn.accept{background:var(--green-500)}
.call-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 8px;max-width:100%;margin:0 auto}
@media(max-width:420px){.call-btn{width:44px;height:44px;font-size:16px} .call-overlay{padding:20px 10px}}
@media(max-width:480px){.call-btn{width:48px;height:48px;font-size:18px}}
.call-btn.hang{background:var(--danger)}
.call-btn.accept{background:var(--green-500)}
.call-btn.muted{background:#fff;color:var(--ink)}

/* group call grid */
.group-vid-grid{display:grid;width:100%;height:100%;gap:2px;background:#000}
.group-vid-grid.p1{grid-template-columns:1fr}
.group-vid-grid.p2{grid-template-columns:1fr 1fr}
.group-vid-grid.p3,.group-vid-grid.p4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.group-vid-item{position:relative;overflow:hidden;background:#111}
.group-vid-item video{width:100%;height:100%;object-fit:cover}
.group-vid-item .lbl{position:absolute;bottom:6px;left:8px;color:#fff;font-size:12px;font-weight:700;text-shadow:0 1px 4px #000}

/* incoming call banner (не на весь экран) */
.call-banner{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:450;background:#fff;border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--line);display:none;align-items:center;gap:10px;padding:10px 14px;width:min(420px,calc(100vw - 20px));animation:pop .2s ease}
.call-banner.open{display:flex}
.call-banner .ca{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;overflow:hidden;flex:none}
.call-banner .ca img{width:100%;height:100%;object-fit:cover}
.call-banner .info{flex:1;min-width:0}
.call-banner .info b{display:block}
.call-banner .info span{font-size:12px;color:var(--ink-soft)}
.call-banner .b{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:20px;color:#fff;flex:none}
.call-banner .b.acc{background:var(--green-500)}
.call-banner .b.dec{background:var(--danger)}

/* contact request banner */
.creq{background:#fff7e6;border-bottom:1px solid #f0d9a0;padding:10px 14px;text-align:center}
.creq .ct{font-size:13px;color:#8a6d1f;font-weight:700;margin-bottom:8px}
.creq .cb{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.creq .cb button{padding:8px 14px;border-radius:12px;font-weight:800;font-size:13px}
.creq .add{background:var(--green-500);color:#fff}
.creq .block{background:#fde;color:var(--danger)}
.creq .del{background:var(--green-050);color:var(--ink-soft)}

/* settings */
.set-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:var(--green-050);cursor:pointer;margin-bottom:12px}
.set-list{display:flex;flex-direction:column;gap:2px}
.set-item{display:flex;align-items:center;gap:12px;padding:13px 8px;border-radius:12px;text-align:left;width:100%}
.set-item:hover{background:var(--green-050)}
.set-item .si{font-size:22px;width:30px;text-align:center;flex:none}
.set-item div{flex:1;min-width:0}
.set-item b{display:block;font-size:15px}
.set-item span{font-size:12px;color:var(--ink-soft)}
.set-item i{color:var(--ink-soft);font-style:normal;font-size:18px}
.set-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 8px;font-weight:700;border-bottom:1px solid #eef7f0}
.set-toggle input{width:42px;height:24px;accent-color:var(--green-600)}

/* ===== STORIES ===== */
.stories-bar{display:flex;gap:12px;padding:12px 14px;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--white);scrollbar-width:none}
.stories-bar::-webkit-scrollbar{display:none}
.story-add,.story-item{flex:none;width:66px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.story-ring{width:64px;height:64px;border-radius:50%;padding:2.5px;background:conic-gradient(from 0deg,var(--green-500),var(--green-300),var(--green-600));display:grid;place-items:center;margin:0 auto}
.story-ring.seen{background:var(--line)}
.story-ring .inner{width:57px;height:57px;border-radius:50%;background:#fff;display:grid;place-items:center;overflow:hidden;font-weight:800;color:#fff}
.story-ring .inner img{width:100%;height:100%;object-fit:cover}
.story-lbl{font-size:11px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);font-weight:600}
.story-add .plus{width:57px;height:57px;border-radius:50%;background:var(--green-100);color:var(--green-700);display:grid;place-items:center;font-size:28px;margin:0 auto;border:2px dashed var(--green-300)}

/* Full-screen story viewer — Instagram/WhatsApp style */
.story-view{position:fixed;inset:0;z-index:400;background:#000;display:none;flex-direction:column;overflow:hidden;touch-action:none}
.story-view.open{display:flex}

/* progress bars */
.story-bars{display:flex;gap:3px;padding:10px 12px 6px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none}
.story-bars i{flex:1;height:2.5px;background:rgba(255,255,255,.35);border-radius:3px;overflow:hidden}
.story-bars i b{display:block;height:100%;width:0;background:#fff;border-radius:3px}

/* story header */
.story-hd{position:absolute;top:22px;left:0;right:0;z-index:10;display:flex;align-items:center;gap:10px;padding:0 12px}
.story-hd .sav{width:38px;height:38px;border-radius:50%;border:2px solid #fff;overflow:hidden;flex:none;display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px}
.story-hd .sav img{width:100%;height:100%;object-fit:cover}
.story-hd .smeta{flex:1;min-width:0}
.story-hd .sname{color:#fff;font-weight:800;font-size:14px}
.story-hd .stime{color:rgba(255,255,255,.75);font-size:12px}

/* the media itself */
.story-media{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.story-media img,.story-media video{width:100%;height:100%;object-fit:cover}

/* text overlay on story */
.story-text-overlay{position:absolute;pointer-events:none;font-weight:800;font-size:26px;text-shadow:0 2px 8px rgba(0,0,0,.7);z-index:5;max-width:90%;text-align:center;transform:translate(-50%,-50%)}

/* caption strip */
.story-cap{position:absolute;bottom:80px;left:0;right:0;z-index:10;padding:10px 16px;color:#fff;text-align:center;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.story-cap b{display:block;font-size:17px;margin-bottom:2px}

/* tap zones — left/right halves */
.story-tap{position:absolute;inset:0;z-index:6;display:flex}
.story-tap .sl,.story-tap .sr{flex:1}

/* reply bar at the bottom */
.story-reply{position:absolute;bottom:0;left:0;right:0;z-index:11;display:flex;align-items:center;gap:8px;padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(0,0,0,.5))}
.story-reply input{flex:1;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);border-radius:22px;padding:10px 14px;color:#fff;font-size:15px;font-family:var(--font-b);outline:none}
.story-reply input::placeholder{color:rgba(255,255,255,.6)}
.story-reply .srbtn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:20px;display:grid;place-items:center;flex:none}

/* close button */
.story-close{position:absolute;top:16px;right:12px;z-index:12;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:grid;place-items:center;font-size:18px;font-weight:800}

/* views counter */
.story-views{position:absolute;bottom:80px;left:12px;z-index:11;color:rgba(255,255,255,.8);font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}

/* emoji reaction row (for others' stories) */
.story-emojis{display:flex;gap:6px}
.story-emojis button{font-size:22px;background:rgba(255,255,255,.15);border-radius:50%;width:40px;height:40px;display:grid;place-items:center;transition:.1s}
.story-emojis button:active{transform:scale(1.3)}


/* ===== FEED ===== */
.feed{flex:1;overflow-y:auto;padding:14px;min-height:0;background:var(--green-050)}
.post{background:#fff;border-radius:18px;box-shadow:var(--shadow-sm);margin:0 auto 14px;max-width:560px;overflow:hidden;border:1px solid var(--line)}
.post-head{display:flex;align-items:center;gap:10px;padding:10px 12px}
.post-head .nm{font-weight:800}
.post-head .tm{font-size:11px;color:var(--ink-soft)}
.post-media img,.post-media video{width:100%;display:block;max-height:520px;object-fit:cover;background:#000}
.post-body{padding:10px 14px}
.post-body .ttl{font-weight:800;font-size:17px;margin-bottom:3px}
.post-body .desc{color:var(--ink-soft);white-space:pre-wrap}
.post-foot{display:flex;gap:18px;padding:8px 14px;border-top:1px solid var(--line);color:var(--ink-soft);font-weight:700}
.post-foot button{display:flex;align-items:center;gap:6px;color:inherit}
.post-foot button.liked{color:var(--danger)}
.tabbar{display:flex;border-top:1px solid var(--line);background:#fff}
.tabbar button{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--ink-soft)}
.tabbar button.on{color:var(--green-700)}
.tabbar button .ic{font-size:20px}

/* ===== LOADING SCREEN ===== */
.loading-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:
    radial-gradient(1200px 600px at -10% -10%, var(--green-100), transparent 60%),
    radial-gradient(900px 500px at 110% 110%, var(--mint), transparent 60%), var(--green-050)}
.loading-egg{font-size:80px;animation:eggbounce 1.1s ease-in-out infinite}
@keyframes eggbounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-18px) rotate(4deg)}}
.loading-bar{width:160px;height:6px;background:var(--green-100);border-radius:6px;overflow:hidden}
.loading-bar b{display:block;height:100%;width:40%;background:var(--green-500);border-radius:6px;animation:loadslide 1.1s ease-in-out infinite}
@keyframes loadslide{0%{margin-left:-40%}100%{margin-left:100%}}
.loading-txt{font-family:var(--font-d);font-weight:800;color:var(--green-700);font-size:18px}

/* ===== CUSTOM DIALOGS ===== */
.dlg-bg{position:fixed;inset:0;background:rgba(15,40,22,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;animation:fadein .15s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.dlg{background:#fff;border-radius:22px;max-width:380px;width:100%;box-shadow:var(--shadow);overflow:hidden;animation:pop .18s ease}
.dlg .dh{padding:20px 22px 6px;display:flex;align-items:center;gap:10px}
.dlg .dh .di{font-size:30px}
.dlg .dh h4{margin:0;font-family:var(--font-d);font-weight:800;font-size:19px;color:var(--green-700)}
.dlg .dm{padding:4px 22px 16px;color:var(--ink-soft);font-weight:600;line-height:1.45;white-space:pre-wrap}
.dlg .dinp{margin:0 22px 14px;width:calc(100% - 44px);padding:12px 14px;border:2px solid var(--line);border-radius:14px;background:var(--green-050);outline:none;font-size:15px}
.dlg .dinp:focus{border-color:var(--green-500);background:#fff}
.dlg .da{display:flex;gap:8px;padding:0 18px 18px}
.dlg .da button{flex:1;padding:13px;border-radius:14px;font-weight:800;font-size:15px}
.dlg .da .cancel{background:var(--green-050);color:var(--ink-soft)}
.dlg .da .ok{background:linear-gradient(180deg,var(--green-500),var(--green-600));color:#fff}
.dlg .da .ok.danger{background:linear-gradient(180deg,#f0746a,var(--danger))}
.edited{font-size:10px;color:var(--ink-soft)}

/* composer */
.replybar{display:none;align-items:center;gap:10px;padding:8px 14px;background:var(--green-050);border-top:1px solid var(--line)}
.replybar .pl{width:3px;height:32px;background:var(--green-500);border-radius:4px}
.replybar .t{flex:1;min-width:0}
.replybar .t b{font-size:12px;color:var(--green-700);display:block}
.replybar .t span{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.composer{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;background:var(--white);border-top:1px solid var(--line)}
.composer textarea{
  flex:1;resize:none;border:2px solid var(--line);border-radius:20px;padding:11px 14px;font-size:15px;
  max-height:120px;outline:none;background:var(--green-050);line-height:1.35;
}
.composer textarea:focus{border-color:var(--green-500);background:#fff}
.send{width:48px;height:48px;border-radius:50%;background:linear-gradient(180deg,var(--green-500),var(--green-600));color:#fff;font-size:20px;display:grid;place-items:center;flex:none;box-shadow:var(--shadow-sm)}
.send:active{transform:scale(.93)}
.colordot{width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}

.attach-menu{position:absolute;bottom:74px;left:14px;background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:8px;display:none;grid-template-columns:repeat(3,1fr);gap:6px;width:280px;z-index:30;border:1px solid var(--line)}
.attach-menu.open{display:grid}
.attach-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 6px;border-radius:14px;font-size:12px;font-weight:700;color:var(--ink-soft);transition:.12s}
.attach-item:hover{background:var(--green-050)}
.attach-item .ic{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:22px;color:#fff;background:var(--green-500)}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-soft);text-align:center;padding:30px}
.empty .e{font-size:90px;margin-bottom:10px;filter:drop-shadow(0 8px 10px rgba(58,167,87,.2))}

/* ---------- MODALS ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,40,22,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:24px;width:100%;max-width:440px;max-height:88vh;overflow:auto;box-shadow:var(--shadow);animation:pop .2s ease}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.modal-h h3{margin:0;font-family:var(--font-d);font-weight:800;font-size:20px;color:var(--green-700)}
.modal-b{padding:18px 20px}
.seg{display:flex;background:var(--green-050);border-radius:14px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:9px;border-radius:10px;font-weight:800;color:var(--ink-soft)}
.seg button.on{background:#fff;color:var(--green-700);box-shadow:var(--shadow-sm)}
.user-pick{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;cursor:pointer;transition:.12s}
.user-pick:hover{background:var(--green-050)}
.user-pick.on{background:var(--green-100)}
.user-pick input{width:20px;height:20px;accent-color:var(--green-600)}
.checkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(--green-300);display:grid;place-items:center;flex:none;color:#fff;font-weight:800;font-size:14px;transition:.12s}
.checkbox.on{background:var(--green-600);border-color:var(--green-600)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chips:empty{display:none}
.chip{background:var(--green-100);color:var(--green-700);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.chip b{cursor:pointer;color:var(--green-600);font-size:12px}
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #eef7f0}
.member-row .nm{flex:1;font-weight:700}
.list-scroll{max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:14px;padding:6px;margin-top:8px}

/* calculator */
.calc{max-width:340px}
.calc-screen{background:#0f1f15;color:#fff;border-radius:16px;padding:16px;text-align:right;margin-bottom:12px;font-family:ui-monospace,monospace}
.calc-screen .expr{color:#9fe6b1;min-height:20px;font-size:15px;word-break:break-all}
.calc-screen .now{font-size:34px;font-weight:800;min-height:40px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.calc-grid button{padding:16px;border-radius:14px;font-size:18px;font-weight:800;background:var(--green-050);color:var(--ink)}
.calc-grid button.op{background:var(--green-100);color:var(--green-700)}
.calc-grid button.eq{background:linear-gradient(180deg,var(--green-500),var(--green-600));color:#fff}
.calc-grid button.fn{background:#eef7f0;color:var(--ink-soft);font-size:15px}
.calc-grid button:active{transform:scale(.95)}

/* sticker maker */
.sticker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.sticker-grid button{font-size:32px;padding:8px;border-radius:12px}
.sticker-grid button:hover{background:var(--green-050)}
.sticker-grid button img{width:48px;height:48px;object-fit:contain}
#stickerCanvas{border:2px dashed var(--green-300);border-radius:14px;touch-action:none;background:#fff;width:100%;display:block}

.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.swatches button{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
.swatches button.on{box-shadow:0 0 0 3px var(--green-500)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green-900);color:#fff;padding:12px 20px;border-radius:14px;font-weight:700;z-index:300;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;bottom:34px}

.rec-ring{display:none;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-top:1px solid var(--line)}
.rec-dot{width:14px;height:14px;border-radius:50%;background:var(--danger);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}
.rec-time{font-weight:800;color:var(--danger)}
.rec-live{flex:1;font-size:13px;color:var(--ink-soft);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.back-btn{display:none}
@media(max-width:760px){
  .sidebar{width:100%;min-width:0;position:absolute;inset:0;z-index:20}
  .shell.in-chat .sidebar{display:none}
  .main{position:absolute;inset:0}
  .shell:not(.in-chat) .main{display:none}
  .back-btn{display:grid}
}
.fab{position:absolute;bottom:18px;right:18px;width:58px;height:58px;border-radius:50%;background:linear-gradient(180deg,var(--green-500),var(--green-600));color:#fff;font-size:26px;display:grid;place-items:center;box-shadow:var(--shadow);z-index:5}
/* На ПК: карандаш скрывается когда открыт чат — sidebar перекрывает */
@media(min-width:761px){.shell.in-chat .sidebar .fab{display:none}}

/* ===== USER PROFILE PAGE ===== */
.profile-page{position:fixed;inset:0;z-index:150;background:var(--white);display:none;flex-direction:column;overflow-y:auto}
.profile-page.open{display:flex}
.profile-cover{height:180px;background:linear-gradient(135deg,var(--green-700),var(--green-500));position:relative;flex:none}
.profile-cover-actions{position:absolute;top:12px;right:12px;display:flex;gap:8px}
.profile-cover-btn{background:rgba(0,0,0,.35);color:#fff;border-radius:50%;width:38px;height:38px;display:grid;place-items:center;font-size:18px}
.profile-avatar-wrap{position:absolute;bottom:-36px;left:20px}
.profile-avatar-wrap .avatar{width:76px;height:76px;font-size:28px;border:4px solid #fff;box-shadow:var(--shadow-sm)}
.profile-info{padding:44px 20px 16px;border-bottom:1px solid var(--line)}
.profile-info .pname{font-family:var(--font-d);font-weight:800;font-size:24px;color:var(--ink)}
.profile-info .pnick{color:var(--green-600);font-weight:700;margin:2px 0}
.profile-info .pbio{color:var(--ink-soft);margin-top:4px;font-size:14px}
.profile-stats{display:flex;gap:0;border-bottom:1px solid var(--line)}
.profile-stats .pstat{flex:1;padding:14px 8px;text-align:center;cursor:pointer;border-right:1px solid var(--line)}
.profile-stats .pstat:last-child{border-right:none}
.profile-stats .pstat .val{font-family:var(--font-d);font-weight:800;font-size:20px;color:var(--green-700)}
.profile-stats .pstat .lbl{font-size:11px;color:var(--ink-soft);font-weight:700}
.profile-actions{display:flex;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line)}
.profile-actions .sub-btn{flex:1;padding:11px;border-radius:14px;font-weight:800;font-size:15px;background:linear-gradient(180deg,var(--green-500),var(--green-600));color:#fff;box-shadow:var(--shadow-sm)}
.profile-actions .sub-btn.subbed{background:var(--green-050);color:var(--green-700)}
.profile-actions .msg-btn{width:48px;height:48px;border-radius:14px;background:var(--green-050);color:var(--green-700);font-size:22px;display:grid;place-items:center}
.profile-streak{display:flex;align-items:center;gap:10px;padding:12px 20px;background:linear-gradient(135deg,#fff9e6,#fff3cd);border-bottom:1px solid #ffe082}
.profile-streak .streak-label{font-weight:800;color:#8a6d1f}
.streak-eggs{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.profile-tabs{display:flex;border-bottom:2px solid var(--line)}
.profile-tab{flex:1;padding:12px 4px;text-align:center;font-weight:800;font-size:13px;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer}
.profile-tab.on{color:var(--green-700);border-bottom-color:var(--green-700)}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}
.profile-grid-item{aspect-ratio:1;position:relative;cursor:pointer;overflow:hidden;background:#eee}
.profile-grid-item img,.profile-grid-item video{width:100%;height:100%;object-fit:cover}
.profile-grid-item .pgi-stats{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:6px 6px 4px;display:flex;gap:10px;color:#fff;font-size:11px;font-weight:700}
.profile-grid-item .pgi-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}

/* ===== STREAK SYSTEM ===== */
.streak-egg-display{display:inline-flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.streak-d1{font-size:22px}
.streak-d2{font-size:22px;filter:drop-shadow(0 0 4px rgba(255,220,0,.8))}
.streak-d5{font-size:22px;filter:drop-shadow(0 0 8px rgba(255,100,0,.9))}
.streak-d7{font-size:24px;filter:drop-shadow(0 0 10px rgba(255,60,0,1))}
.streak-d10{font-size:26px;filter:drop-shadow(0 0 12px rgba(255,200,0,1))}
.chat-streak-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;padding:2px 7px;border-radius:10px;background:linear-gradient(135deg,#fff3cd,#ffe082);color:#8a6d1f;margin-left:4px}

/* ===== AI WRITER ===== */
.ai-writer-btn{background:linear-gradient(135deg,#4285f4,#8b5cf6);color:#fff;border-radius:14px;padding:10px 16px;font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px;margin-top:8px;width:100%}

<script>
/* ============================================================
   EggoX Messenger — single-file app

const firebaseConfig = {

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();
const auth = firebase.auth();
try{ auth.useDeviceLanguage(); }catch(e){ auth.languageCode='ru'; }   // SMS и reCAPTCHA на языке пользователя

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };
const esc = s => (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const now = () => Date.now();
// uid теперь всегда берётся из Firebase Authentication
const uid = () => auth.currentUser ? auth.currentUser.uid : null;
let phoneKey = '';  // номер телефона (используется для отображения и поиска по phoneIndex)
function rid(p='id'){ return p+'_'+Math.random().toString(36).slice(2,10)+now().toString(36); }
function fmtTime(t){ const d=new Date(t); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function fmtDate(t){ const d=new Date(t),n=new Date(); if(d.toDateString()===n.toDateString())return fmtTime(t); return d.getDate()+'.'+(d.getMonth()+1); }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- loading screen ---------- */
function showLoading(text){

    <div class="loading-egg">🥚</div>
    <div class="loading-txt">Eggo<span style="color:var(--green-500)">X</span></div>
    <div class="loading-bar"><b></b></div>
    <div style="color:var(--ink-soft);font-weight:700">${text||t('loading')}</div>
  </div>`;
}

/* ---------- custom dialogs (вместо браузерных confirm/prompt/alert) ---------- */
function eggDialog({icon='🥚',title='EggoX',message='',input=null,okText='OK',cancelText='Отмена',danger=false,showCancel=true}){
  return new Promise(resolve=>{
    const bg=el('div','dlg-bg');
    bg.innerHTML=`<div class="dlg">
      <div class="dh"><span class="di">${icon}</span><h4>${esc(title)}</h4></div>
      ${message?`<div class="dm">${esc(message)}</div>`:''}
      ${input!=null?`<input class="dinp" id="dlgInput" placeholder="${esc(input.placeholder||'')}" value="${esc(input.value||'')}">`:''}
      <div class="da">
        ${showCancel?`<button class="cancel" id="dlgCancel">${esc(cancelText)}</button>`:''}
        <button class="ok ${danger?'danger':''}" id="dlgOk">${esc(okText)}</button>
      </div>
    </div>`;
    document.body.append(bg);
    const inp=bg.querySelector('#dlgInput'); if(inp){ setTimeout(()=>inp.focus(),60); inp.onkeydown=e=>{if(e.key==='Enter')done(true);}; }
    const done=ok=>{ const val=inp?inp.value:true; bg.remove(); resolve(ok?val:null); };
    bg.querySelector('#dlgOk').onclick=()=>done(true);
    const c=bg.querySelector('#dlgCancel'); if(c)c.onclick=()=>done(false);
    bg.onclick=e=>{ if(e.target===bg)done(false); };
  });
}
function eggConfirm(message,{title='Подтверждение',icon='❓',okText='Да',danger=false}={}){
  return eggDialog({icon,title,message,okText,cancelText:'Отмена',danger}).then(r=>r!==null);
}
function eggPrompt(message,value='',{title='Введите',icon='✏️',placeholder=''}={}){
  return eggDialog({icon,title,message,input:{value,placeholder},okText:'Готово'});
}
function eggAlert(message,{title='EggoX',icon='🥚'}={}){
  return eggDialog({icon,title,message,okText:'Понятно',showCancel:false});
}
function avatarColor(s){ const c=['#3aa757','#2f8f43','#56c271','#1f8a4c','#4cae7b','#2e9e8f']; let h=0; for(const ch of (s||'x'))h=(h*31+ch.charCodeAt(0))%c.length; return c[h]; }
function initials(n){ return (n||'?').trim().slice(0,2).toUpperCase(); }

/* ---------- state ---------- */
let ME = null;           // {uid,name,phone,avatar}
let chats = {};          // chatId -> meta
let activeChat = null;   // chatId
let activeMeta = null;
let usersCache = {};     // uid -> user
let replyTo = null;      // message being replied to
let editTarget = null;   // message being edited
let textColor = '';      // chosen text color
let msgListeners = [];

/* ============================================================
   AUTH / REGISTRATION  (phone-based, verification skipped)
   ============================================================ */
function sanitizePhone(p){ return p.replace(/[^\d]/g,''); }

function showAuth(){
  // NOTE: do NOT restore session from localStorage here —
  // onAuthStateChanged handles that properly once Firebase is ready.
  // Doing it here causes a race condition before auth.currentUser is set.

  $('#app').innerHTML = `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo-egg">🥚</div>
      <div class="brand">Eggo<span>X</span></div>
      <p class="subtitle">Зелёный мессенджер нового поколения</p>

      <div id="authMain">
        <div class="field"><label>Имя</label>
          <input class="inp" id="aName" placeholder="Как вас зовут?" autocomplete="off" autocapitalize="words"></div>
        <div class="field"><label>Номер телефона</label>
          <input class="inp" id="aPhone" placeholder="+7 900 000 00 00" inputmode="tel" type="tel" autocomplete="tel" name="eggox_phone"></div>
        <button class="btn" onclick="requestCode()">Получить код подтверждения 📲</button>
        <div class="divider">или</div>
        <button class="btn ghost" onclick="showLinkEnter()">🔗 Привязать это устройство</button>
        <p class="tiny">Введите номер с кодом страны (например +7 900 000 00 00). На него придёт SMS с кодом.</p>
      </div>

      <div id="authVerify" style="display:none">
        <div style="font-size:46px">📲</div>
        <p class="subtitle" style="margin:6px 0 4px">Введите код подтверждения</p>
        <p class="tiny" id="verifySent" style="margin-top:0"></p>
        <input class="inp" id="codeInput" inputmode="numeric" maxlength="6" placeholder="• • • • •" autocomplete="one-time-code" style="text-align:center;font-size:28px;letter-spacing:10px;font-weight:800">
        <button class="btn" onclick="verifyCode()">Подтвердить ✓</button>
        <button class="btn ghost" onclick="resendCode()">Отправить код заново</button>
        <button class="btn ghost" onclick="showAuthMain()">← Изменить номер</button>
      </div>

      <div id="authLink" style="display:none">
        <div style="font-size:40px;text-align:center;margin-bottom:6px">🔗</div>
        <p class="subtitle" style="margin:0 0 14px">Введите код с основного устройства</p>
        <div class="field">
          <input class="inp" id="linkCode"
            placeholder="XXXX-XXXX-XXXX-XXXX"
            inputmode="text"
            autocapitalize="characters"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            maxlength="19"
            oninput="formatLinkCode(this)"
            style="text-align:center;font-size:22px;font-weight:800;letter-spacing:3px;font-family:var(--font-d)">
        </div>
        <div id="linkStatus" style="font-size:13px;color:var(--ink-soft);text-align:center;margin:-6px 0 10px;min-height:18px"></div>
        <button class="btn" onclick="doLinkEnter()">Привязать ✓</button>
        <button class="btn ghost" onclick="showAuthMain()">← Назад</button>
        <p class="tiny">Код из 16 символов (буквы и цифры). Дефисы вводить не обязательно — просто вставьте или введите код целиком.</p>
      </div>
    </div>
  </div>`;

  // recaptchaContainer must live OUTSIDE the auth-card so it is never destroyed
  // when showAuthMain() / goToVerify() swap panels via style.display.
  // We attach it directly to <body> — invisible reCAPTCHA renders a hidden iframe anyway.
  if(!document.getElementById('recaptchaContainer')){
    const rc = document.createElement('div');
    rc.id = 'recaptchaContainer';
    document.body.appendChild(rc);
  }
}
function showLinkEnter(){ hideAuthPanels(); $('#authLink').style.display='block'; }
function showAuthMain(){ hideAuthPanels(); $('#authMain').style.display='block'; }
function hideAuthPanels(){ ['authMain','authVerify','authLink'].forEach(id=>{const e=$('#'+id); if(e)e.style.display='none';}); }

let pendingPhone='', pendingName='', codeTries=0;
const DEFAULT_CC = '7';        // код страны по умолчанию, если введён номер без него (РФ=7)

// Приводим ввод к международному формату E.164 (+CCXXXXXXXXXX)
function normalizePhone(raw){
  let s=(raw||'').trim();
  if(s.startsWith('+')){ return '+'+s.slice(1).replace(/\D/g,''); }
  let d=s.replace(/\D/g,'');
  if(d.length===11 && d[0]==='8') d='7'+d.slice(1);
  else if(d.length===10) d=DEFAULT_CC+d;
  return '+'+d;
}

// reCAPTCHA: Firebase привязывается к конкретному DOM-элементу по его id.
// Единственный надёжный способ сбросить её — удалить элемент из DOM целиком
// и создать новый с тем же id. innerHTML='' не помогает — виджет уже зарегистрирован
// внутри Firebase и выдаёт «already been rendered in this element».
function freshRecaptcha(){
  try{ if(window.recaptchaVerifier){ window.recaptchaVerifier.clear(); } }catch(e){}
  window.recaptchaVerifier = null;

  // Удаляем старый контейнер целиком и создаём новый — это сбрасывает привязку виджета
  const old = document.getElementById('recaptchaContainer');
  if(old) old.parentNode.removeChild(old);
  const host = document.createElement('div');
  host.id = 'recaptchaContainer';
  document.body.appendChild(host);

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptchaContainer', {size:'invisible'});
  return window.recaptchaVerifier;
}

let sending=false;
async function requestCode(){
  if(sending) return;
  const name=$('#aName').value.trim();
  if(name.length<2) return toast('Введите имя (мин. 2 символа)');
  const e164=normalizePhone($('#aPhone').value);
  const digits=e164.replace('+','');
  if(digits.length<10 || digits.length>15) return toast('Проверьте номер: формат +код страны, напр. +7 900 000 00 00');
  pendingName=name; pendingPhone=digits; codeTries=0;

  sending=true; toast('Отправляем SMS на '+e164+'…');
  try{
    const verifier=freshRecaptcha();
    window.confirmationResult=await auth.signInWithPhoneNumber(e164,verifier);
    goToVerify('Код отправлен по SMS на '+e164);
  }catch(e){
    console.error('PhoneAuth error',e);
    try{ window.recaptchaVerifier&&window.recaptchaVerifier.clear(); }catch(_){}
    window.recaptchaVerifier=null;
    handleAuthError(e.code||'', e.message||'');
  }finally{ sending=false; }
}
function handleAuthError(code,msg){
  const map={
    'auth/invalid-phone-number':'Неверный формат номера. Введите с кодом страны: +7 900 000 00 00',
    'auth/missing-phone-number':'Введите номер телефона',
    'auth/too-many-requests':'Слишком много запросов с этого устройства/номера. Подождите 30–60 минут, либо добавьте этот номер как «тестовый» в Firebase → Authentication → Phone.',
    'auth/quota-exceeded':'Превышена дневная квота SMS. Используйте тестовый номер в консоли Firebase.',
    'auth/operation-not-allowed':'Провайдер Phone не включён: Firebase → Authentication → Sign-in method.',
    'auth/unauthorized-domain':'Домен не в списке Authorized domains (Authentication → Settings).',
    'auth/captcha-check-failed':'reCAPTCHA не прошла. Обновите страницу и попробуйте снова.',
    'auth/billing-not-enabled':'Нужен план Blaze для SMS. Для отладки используйте тестовый номер.',
    'auth/network-request-failed':'Нет сети. Проверьте интернет-соединение.'
  };
  let m=map[code];
  if(!m && /region|sms.*not.*enabled|destination/i.test(msg)) m='SMS-регион не разрешён: Authentication → Settings → SMS region policy.';
  toast(m || ('Ошибка: '+(code||msg||'неизвестно')));
  showAuthMain();
}
function goToVerify(msg){
  hideAuthPanels();
  $('#authVerify').style.display='block';
  $('#verifySent').textContent=msg;
  const inp=$('#codeInput'); if(inp){ inp.value=''; }
  setTimeout(()=>$('#codeInput')?.focus(),120);
}
function resendCode(){ requestCode(); }
async function verifyCode(){
  const entered=($('#codeInput').value||'').trim();
  if(!entered) return toast('Введите код');
  if(!window.confirmationResult) return toast('Сначала запросите код');
  try{
    toast('Проверяем код…');
    const cred = await window.confirmationResult.confirm(entered);
    // auth.currentUser.uid теперь реальный Firebase uid
    phoneKey = pendingPhone;
    await bootMe(pendingName);
  }catch(e){
    console.error('confirm error',e);
    codeTries++;
    toast(e.code==='auth/invalid-verification-code'?'Неверный код подтверждения':'Не удалось подтвердить код');
  }
}
async function bootMe(name){
  const firebaseUid = auth.currentUser?.uid;
  if(!firebaseUid){ showAuth(); return; }
  const ref = db.ref('users/'+firebaseUid);
  const snap = await ref.get();
  let user = snap.val();

  // восстановление аккаунта в течение часа
  if(user && user.deleted){
    if(user.deletedAt && (now()-user.deletedAt) < 3600000){
      const restore=await eggConfirm('Этот аккаунт был удалён '+Math.floor((now()-user.deletedAt)/60000)+' мин назад. Восстановить его?',{title:'Восстановление',icon:'♻️',okText:'Восстановить'});
      if(restore){
        user.deleted=false; user.name=user.nameBackup||name||'Юзер';
        if(user.nicknameBackup){ user.nickname=user.nicknameBackup; await db.ref('nicknames/'+user.nicknameBackup).set(firebaseUid); }
        await ref.update({deleted:false,name:user.name,nickname:user.nickname||null,deletedAt:null});
        toast('Аккаунт восстановлен ✓');
      } else { try{auth.signOut();}catch(e){} localStorage.removeItem('eggox_session'); showAuth(); return; }
    } else {
      await eggAlert('Этот аккаунт был удалён и не подлежит восстановлению.',{title:'Аккаунт удалён',icon:'⚠️'});
      try{auth.signOut();}catch(e){} localStorage.removeItem('eggox_session'); showAuth(); return;
    }
  }

  if(!user){
    user={uid:firebaseUid,name:(name&&name.length>1?name:(pendingName&&pendingName.length>1?pendingName:'Юзер')),phone:phoneKey,avatar:'',created:now()};
  } else {
    if(name&&name.length>1&&name!==user.name) user.name=name;
    if(phoneKey) user.phone=phoneKey;
    // Если имя по-прежнему «Юзер» и есть сохранённое в localStorage — подставляем
    if(user.name==='Юзер'&&pendingName&&pendingName.length>1) user.name=pendingName;
  }
  user.uid=firebaseUid;
  user.online=true; user.lastSeen=now();
  await ref.update(user);

  // phoneIndex: phone -> uid (для поиска пользователя по номеру)
  if(phoneKey){
    await db.ref('phoneIndex/'+phoneKey).set(firebaseUid);
  }

  ref.child('online').onDisconnect().set(false);
  ref.child('lastSeen').onDisconnect().set(now());
  ME=user;
  localStorage.setItem('eggox_session',JSON.stringify({phoneKey,name:user.name}));
  enterApp();
}
function logout(){
  if(ME) db.ref('users/'+ME.uid).update({online:false,lastSeen:now()});
  try{ auth.signOut(); }catch(e){}
  localStorage.removeItem('eggox_session');
  location.reload();
}
function deleteAccount(){
  const bg=el('div','dlg-bg');
  bg.innerHTML=`<div class="dlg">
    <div class="dh"><span class="di">⚠️</span><h4 style="color:var(--danger)">Удаление аккаунта</h4></div>
    <div class="dm">Это действие удалит ваш аккаунт. Все ваши чаты, истории и данные станут недоступны, а для собеседников вы будете отображаться как «Аккаунт удалён».\n\nВосстановить аккаунт можно только в течение 1 часа после удаления — войдите снова с этим же номером.\n\nВы понимаете последствия и подтверждаете удаление?</div>
    <label style="display:flex;gap:10px;align-items:center;padding:0 22px 10px;font-weight:700;color:var(--ink)"><input type="checkbox" id="delAgree" style="width:20px;height:20px;accent-color:var(--danger)"> Да, я согласен(на) удалить аккаунт и потерять данные</label>
    <div class="da">
      <button class="cancel" id="delCancel">Отмена</button>
      <button class="ok danger" id="delGo" disabled style="opacity:.5">Удалить (10)</button>
    </div>
  </div>`;
  document.body.append(bg);
  let left=10; const goBtn=bg.querySelector('#delGo'); const agree=bg.querySelector('#delAgree');
  const tick=setInterval(()=>{ left--; goBtn.textContent=left>0?`Удалить (${left})`:'Удалить'; if(left<=0){ clearInterval(tick); upd(); } },1000);
  const upd=()=>{ const ok=left<=0 && agree.checked; goBtn.disabled=!ok; goBtn.style.opacity=ok?'1':'.5'; };
  agree.onchange=upd;
  bg.querySelector('#delCancel').onclick=()=>{ clearInterval(tick); bg.remove(); };
  goBtn.onclick=async()=>{
    if(goBtn.disabled)return; clearInterval(tick); bg.remove();
    try{

}

/* ---------- device linking (WhatsApp-style) ---------- */
async function generateLinkCode(){
  // Encode phone directly into the code so the new device doesn't need Firebase auth to read it
  // Format: phone digits encoded in base32, padded to 12 chars + 4-char checksum
  const phone = phoneKey || '';
  const ts = Math.floor(now()/60000); // minute-level timestamp for expiry check
  const raw = phone + '|' + ts + '|' + (ME.name||'').slice(0,10);
  // Simple base32-encode
  const alphabet = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let encoded = '';
  let buf = 0, bits = 0;
  for(let i=0; i<raw.length; i++){
    buf = (buf << 8) | raw.charCodeAt(i);
    bits += 8;
    while(bits >= 5){ bits -= 5; encoded += alphabet[(buf >> bits) & 31]; }
  }
  if(bits > 0) encoded += alphabet[(buf << (5-bits)) & 31];
  // Pad or trim to 12 chars, add 4-char checksum
  while(encoded.length < 12) encoded += alphabet[0];
  encoded = encoded.slice(0,12);
  let chk = 0;
  for(let i=0;i<encoded.length;i++) chk = (chk*31 + encoded.charCodeAt(i)) & 0xFFFFF;
  const checkStr = (chk).toString(32).toUpperCase().replace(/[^A-Z0-9]/g,'').slice(-4).padStart(4,'2');
  const code = encoded + checkStr;
  const pretty = code.replace(/(.{4})/g,'$1-').replace(/-$/,'');
  // Also write to Firebase as backup (for name retrieval), but don't depend on it
  try{ await db.ref('linkCodes/'+code).set({uid:ME.uid,name:ME.name,phone:phoneKey,exp:now()+1000*60*15}); }catch(e){}
  return {code,pretty};
}

function formatLinkCode(inp){
  // Strip everything except A-Z 0-9, uppercase, then reformat as XXXX-XXXX-XXXX-XXXX
  const raw = inp.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,16);
  const pretty = raw.match(/.{1,4}/g)?.join('-') || raw;
  inp.value = pretty;
  // Move cursor to end
  try{ inp.setSelectionRange(pretty.length, pretty.length); }catch(e){}
  const st = $('#linkStatus');
  if(st){
    const len = raw.length;
    if(len === 0) st.textContent = '';
    else if(len < 16) st.textContent = `Введено ${len}/16 символов`;
    else st.style.color = 'var(--green-600)', st.textContent = '✓ Код введён полностью — нажмите «Привязать»';
  }
}
async function doLinkEnter(){
  const raw = ($('#linkCode').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(raw.length === 0) return toast('Введите код привязки');
  if(raw.length < 16) return toast(`Код должен быть 16 символов, введено ${raw.length}`);
  const statusEl = $('#linkStatus');
  if(statusEl) statusEl.textContent = 'Проверяем код…';
  toast('Проверяем код…');

  // Decode phone directly from the code (no Firebase auth needed)
  const alphabet = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const encoded = raw.slice(0,12);
  let bits = 0, buf = 0;
  let decoded = '';
  for(let i=0;i<encoded.length;i++){
    const idx = alphabet.indexOf(encoded[i]);
    if(idx<0) continue;
    buf = (buf<<5)|idx; bits+=5;
    if(bits>=8){ bits-=8; decoded+=String.fromCharCode((buf>>bits)&0xFF); }
  }
  const parts = decoded.split('|');
  const decodedPhone = (parts[0]||'').replace(/\D/g,'');
  const decodedTs = parseInt(parts[1]||'0');
  const decodedName = parts[2]||'';
  const nowMin = Math.floor(now()/60000);

  // Verify timestamp (valid for 15 minutes)
  if(decodedTs && (nowMin - decodedTs) > 15){
    if(statusEl) statusEl.textContent = '';
    return toast('Код истёк (15 мин). Сгенерируйте новый в профиле → «Привязать устройство»');
  }

  if(decodedPhone && decodedPhone.length >= 7){
    // Successfully decoded from the code itself — no Firebase needed
    phoneKey = decodedPhone;
    pendingName = decodedName;
    if(statusEl) statusEl.textContent = '✅ Код принят!';
    toast('Код принят! Введите свой номер +' + phoneKey + ' для подтверждения');
    hideAuthPanels(); $('#authMain').style.display='block';
    setTimeout(()=>{
      const inp=$('#aPhone'); if(inp) inp.value='+'+phoneKey;
      const nInp=$('#aName'); if(nInp && pendingName) nInp.value=pendingName;
    }, 80);
    // Also try to delete the Firebase record in background
    try{ await db.ref('linkCodes/'+raw).remove(); }catch(e){}
    return;
  }

  // Fallback: try reading from Firebase (requires auth)
  try{
    let anonUser = auth.currentUser;
    if(!anonUser){
      try{ const r = await auth.signInAnonymously(); anonUser = r.user; }
      catch(ae){ console.warn('anon auth failed', ae.message); }
    }
    const snap = await db.ref('linkCodes/'+raw).get();
    const v = snap.val();
    if(!v){ if(statusEl) statusEl.textContent=''; return toast('Код не найден или истёк. Сгенерируйте новый.'); }
    if(v.exp < now()){ await db.ref('linkCodes/'+raw).remove().catch(()=>{}); if(statusEl) statusEl.textContent=''; return toast('Код истёк. Сгенерируйте новый.'); }
    await db.ref('linkCodes/'+raw).remove().catch(()=>{});
    if(anonUser && anonUser.isAnonymous){ try{ await auth.signOut(); }catch(e){} }
    phoneKey = v.phone ? sanitizePhone(v.phone) : '';
    pendingName = v.name || '';
    if(statusEl) statusEl.textContent = '✅ Код принят!';
    toast('Код принят! Введите свой номер +' + phoneKey + ' для подтверждения');
    hideAuthPanels(); $('#authMain').style.display='block';
    setTimeout(()=>{
      const inp=$('#aPhone'); if(inp) inp.value='+'+phoneKey;
      const nInp=$('#aName'); if(nInp && pendingName) nInp.value=pendingName;
    }, 80);
  }catch(e){
    console.error('doLinkEnter error', e);
    if(statusEl) statusEl.textContent = '';
    toast('Ошибка: ' + (e.message||'проверьте интернет'));
  }
}

async function requestNotif(){
  if(!('Notification' in window)) return;
  let permission = Notification.permission;
  if(permission === 'default'){
    try{ permission = await Notification.requestPermission(); }catch(e){}
  }
  if(permission !== 'granted') return;

  // FCM push subscription (works when app is closed / in background)
  try{
    const messaging = firebase.messaging();
    // FCM requires firebase-messaging-sw.js at the root of your site
    const swReg = await navigator.serviceWorker.ready;
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
    if(token && ME){
      // Save this device's FCM token under the user in Firebase
      // so your server (or Firebase Functions) can send pushes to it
      const deviceId = 'web_' + (localStorage.getItem('eggox_device_id') || (()=>{ const id=Math.random().toString(36).slice(2); localStorage.setItem('eggox_device_id',id); return id; })());
      await db.ref('users/' + ME.uid + '/fcmTokens/' + deviceId).set(token);
    }
    // Handle foreground push messages (show a local notification)
    messaging.onMessage(payload => {
      const { title, body, icon } = payload.notification || {};
      if(title){
        try{
          const n = new Notification(title, { body, icon });
          n.onclick = () => { window.focus(); n.close(); };
        }catch(e){}
      }
    });
  }catch(e){
    // FCM not available (e.g. no VAPID key set yet) — fall back to basic Notification API
    console.warn('[EggoX] FCM push not available:', e.message);
  }
}
function pushNotify(cid,m){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  if(cid===activeChat && !document.hidden) return;
  const u=usersCache[m.from]||{name:m.fromName||'Сообщение'};
  const chatName=chats[cid]?(chats[cid].type==='private'?u.name:chatTitle(chats[cid])):u.name;
  const body=(chats[cid]&&chats[cid].type!=='private')?(u.name+': '+lastPreview(m).replace(/^Вы: /,'')):lastPreview(m).replace(/^Вы: /,'');
  try{
    const n=new Notification(chatName,{body,icon:u.avatar||undefined,tag:cid});
    n.onclick=()=>{ window.focus(); openChat(cid); n.close(); };
  }catch(e){}
}
function listenChats(){
  db.ref('reads/'+ME.uid).on('value',s=>{ myReads=s.val()||{}; renderChatList(); });
  db.ref('userChats/'+ME.uid).on('value',snap=>{
    const ids=snap.val()||{};
    const keep=Object.keys(ids);
    keep.forEach(cid=>{
      db.ref('chats/'+cid).on('value',cs=>{
        const m=cs.val(); if(!m){delete chats[cid];return;} m.id=cid; chats[cid]={...m,last:chats[cid]?.last,unread:chats[cid]?.unread};
        db.ref('messages/'+cid).limitToLast(40).on('value',ls=>{
          const entries=Object.entries(ls.val()||{}).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
          const last=entries.length?entries[entries.length-1]:null;
          if(chats[cid]) {
            chats[cid].last=last;
            const lastRead=myReads[cid]||0;
            chats[cid].unread=entries.filter(e=>e.from!==ME.uid && e.ts>lastRead).length;
          }
          // уведомления о новых входящих
          entries.filter(e=>e.from!==ME.uid && e.ts>notifyBaseline && e.ts>(lastNotified[cid]||0)).forEach(e=>{
            lastNotified[cid]=Math.max(lastNotified[cid]||0,e.ts);
            pushNotify(cid,e);
          });
          renderChatList();
          if(last && last.from!==ME.uid && !(last.delivered&&last.delivered[ME.uid]))
            db.ref(`messages/${cid}/${last.id}/delivered/${ME.uid}`).set(true);
        });
        renderChatList();
      });
    });
    Object.keys(chats).forEach(cid=>{ if(!keep.includes(cid)){ delete chats[cid]; }});
    renderChatList();
  });
}

function cacheUser(u){
  if(!u||usersCache[u]) return;
  db.ref('users/'+u).on('value',snap=>{
    if(snap.val()){
      usersCache[u]=snap.val();
      // Только перерисовываем если это активный чат или список
      if(activeChat && activeMeta && activeMeta.members && activeMeta.members[u]){
        const nm=document.querySelector('.chat-head .nm');
        if(nm) nm.textContent=chatTitle(activeMeta);
      }
      // Дебаунс на перерисовку списка
      clearTimeout(cacheUser._t);
      cacheUser._t=setTimeout(renderChatList, 400);
    }
  });
}
async function searchInChat(){
  const q=await eggPrompt('Поиск по сообщениям этого чата:','',{title:'🔍 Поиск',icon:'🔍',placeholder:'слово или фраза'});
  if(!q||!q.trim())return;
  const term=q.trim().toLowerCase();
  const box=$('#messages'); if(!box)return;
  let first=null,count=0;
  box.querySelectorAll('.bd, .bubble').forEach(n=>{ n.style.background=''; });
  box.querySelectorAll('.msg .bubble').forEach(b=>{
    const txt=(b.querySelector('.bd')?.textContent||'').toLowerCase();
    if(term && txt.includes(term)){ count++; b.style.outline='2px solid var(--green-500)'; if(!first)first=b; setTimeout(()=>b.style.outline='',3000); }
  });
  if(first){ first.scrollIntoView({behavior:'smooth',block:'center'}); toast('Найдено: '+count); }
  else toast('Ничего не найдено');
}

function isAdmin(){ return activeMeta && (activeMeta.admins?.[ME.uid] || activeMeta.createdBy===ME.uid); }
function presenceText(uidv){
  const u=usersCache[uidv]; if(!u) return '';
  if(u.deleted) return 'Аккаунт удалён';
  if(u.online && !u.hideOnline) return t('online');
  if(u.hideLastSeen) return t('recently');
  if(u.lastSeen){
    const diff=now()-u.lastSeen;
    if(diff<60000) return t('just_now');
    if(diff<3600000) return 'был(а) '+Math.floor(diff/60000)+' мин назад';
    const d=new Date(u.lastSeen),n=new Date();
    if(d.toDateString()===n.toDateString()) return 'был(а) сегодня в '+fmtTime(u.lastSeen);
    return 'был(а) '+d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' в '+fmtTime(u.lastSeen);
  }
  return t('recently');
}
function canPost(){
  if(!activeMeta) return false;
  if(activeMeta.saved) return true;
  if(activeMeta.type==='channel') return isAdmin();              // в канале пишут только админы
  if(activeMeta.type==='group' && activeMeta.readonly) return isAdmin(); // группа «только чтение» — только админы

}

/* typing indicator */

/* ---------- messages ---------- */
function loadMessages(){
  msgListeners.forEach(l=>l());
  msgListeners=[];
  const box=$('#messages'); box.innerHTML='<div style="text-align:center;color:var(--ink-soft);padding:20px">Загрузка...</div>';
  const ref=db.ref('messages/'+activeChat).limitToLast(200);
  const cb=ref.on('value',snap=>{
    const msgs=snap.val()||{};
    renderMessages(msgs);
  });
  msgListeners.push(()=>ref.off('value',cb));
  // typing listener
  const tref=db.ref('typing/'+activeChat);
  const tcb=tref.on('value',s=>{
    const t=s.val()||{}; delete t[ME.uid];
    const names=Object.values(t);
    const st=$('#headStatus');
    if(st){ if(names.length) st.textContent=names.join(', ')+' печатает...'; else renderChatShellStatus(); }
  });
  msgListeners.push(()=>tref.off('value',tcb));
}
function renderChatShellStatus(){
  const c=activeMeta,st=$('#headStatus'); if(!st)return;
  st.textContent = c.type==='channel'?(Object.keys(c.members||{}).length+' подписчиков')
    : c.type==='group'?(Object.keys(c.members||{}).length+' участников')
    : presenceText(Object.keys(c.members||{}).find(u=>u!==ME.uid));
}

function renderMessages(msgs){
  const box=$('#messages'); if(!box)return;
  const arr=Object.entries(msgs).map(([id,m])=>({id,...m})).sort((a,b)=>a.ts-b.ts);
  box.innerHTML='';
  let lastDay='';
  const reads={};
  arr.forEach(m=>{
    const day=new Date(m.ts).toDateString();
    if(day!==lastDay){ lastDay=day; box.append(dateChip(m.ts)); }
    box.append(renderMsg(m));
    // чат открыт → входящие отмечаем прочитанными
    if(m.from!==ME.uid && !(m.read&&m.read[ME.uid])) reads[m.id]=true;
  });
  Object.keys(reads).forEach(id=>{
    db.ref(`messages/${activeChat}/${id}/read/${ME.uid}`).set(true);
    db.ref(`messages/${activeChat}/${id}/delivered/${ME.uid}`).set(true);
  });
  if(arr.length) db.ref('reads/'+ME.uid+'/'+activeChat).set(now());
  box.querySelectorAll('pre code').forEach(b=>{ try{hljs.highlightElement(b);}catch(e){} });
  box.scrollTop=box.scrollHeight;
}
function dateChip(t){
  const d=new Date(t),n=new Date();
  let s=d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  if(d.toDateString()===n.toDateString())s='Сегодня';
  const c=el('div'); c.style.cssText='align-self:center;background:rgba(255,255,255,.8);padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;color:var(--ink-soft);margin:6px 0';
  c.textContent=s; return c;
}

function renderMsg(m){
  const mine=m.from===ME.uid;
  const wrap=el('div','msg'+(mine?' me':''));
  wrap.id='msg_'+m.id;
  const bubble=el('div','bubble');

  // forwarded
  if(m.forwarded) bubble.append(el('div','fwd','↪️ Переслано'+(m.fwdName?' от '+esc(m.fwdName):'')));
  // sender name in groups
  if(!mine && activeMeta.type!=='private'){
    const u=usersCache[m.from];
    const by=el('div','by',esc(m.fromName||u?.name||'Юзер'));
    bubble.append(by);
  }
  // reply quote
  if(m.replyTo){
    const rq=el('div','reply-quote');
    rq.innerHTML=`<b>${esc(m.replyName||'')}</b><span>${esc(replySummary(m.replyText,m.replyType))}</span>`;
    rq.onclick=()=>{ const t=$('#msg_'+m.replyTo); if(t){t.scrollIntoView({behavior:'smooth',block:'center'}); t.querySelector('.bubble').style.outline='2px solid var(--green-500)'; setTimeout(()=>t.querySelector('.bubble').style.outline='',1200);} };
    bubble.append(rq);
  }

  bubble.append(renderBody(m));

  // reactions
  if(m.reactions){
    const rc=el('div','reactions');
    const groups={};
    Object.entries(m.reactions).forEach(([u,e])=>{ groups[e]=groups[e]||[]; groups[e].push(u); });
    Object.entries(groups).forEach(([emo,users])=>{
      const r=el('div','r'+(users.includes(ME.uid)?' mine':''),emo+' '+users.length);
      r.onclick=()=>react(m,emo);
      rc.append(r);
    });
    bubble.append(rc);
  }

  // time + edited + read receipts
  const tm=el('div','mtime');
  tm.innerHTML=(m.edited?'<span class="edited">изм.</span> ':'')+fmtDate(m.ts);
  if(mine){ tm.innerHTML+=' '+checkMarks(m); }
  bubble.append(tm);

  // long-press / right-click menu (instead of hover emoji bar)
  attachLongPress(bubble,m);
  wrap.append(bubble);
  return wrap;
}

// серая ✓ — отправлено, серые ✓✓ — доставлено, синие ✓✓ — прочитано
function checkMarks(m){
  const others=Object.keys(activeMeta.members||{}).filter(u=>u!==ME.uid);
  if(!others.length) return '<span class="checks sent">✓</span>';
  const read=m.read||{}, del=m.delivered||{};
  const allRead=others.every(u=>read[u]);
  const allDeliv=others.every(u=>read[u]||del[u]);
  const someDeliv=others.some(u=>read[u]||del[u]);
  if(allRead) return '<span class="checks read">✓✓</span>';
  if(allDeliv||someDeliv) return '<span class="checks delivered">✓✓</span>';
  return '<span class="checks sent">✓</span>';
}

let lpTimer=null;
function attachLongPress(bubble,m){
  const open=(x,y)=>openMsgMenu(m,x,y);
  // долгое нажатие (мобильные)
  bubble.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    lpTimer=setTimeout(()=>{ bubble.classList.add('selecting'); if(navigator.vibrate)navigator.vibrate(15); open(t.clientX,t.clientY); setTimeout(()=>bubble.classList.remove('selecting'),300); },480);
  },{passive:true});
  bubble.addEventListener('touchmove',()=>clearTimeout(lpTimer),{passive:true});
  bubble.addEventListener('touchend',()=>clearTimeout(lpTimer),{passive:true});
  // правый клик / долгое нажатие мышью (ПК)
  bubble.addEventListener('contextmenu',e=>{ e.preventDefault(); open(e.clientX,e.clientY); });
  let mt;
  bubble.addEventListener('mousedown',e=>{ if(e.button!==0)return; mt=setTimeout(()=>open(e.clientX,e.clientY),480); });
  bubble.addEventListener('mouseup',()=>clearTimeout(mt));
  bubble.addEventListener('mouseleave',()=>clearTimeout(mt));
}

function openMsgMenu(m,x,y){
  closeCtxMenu();
  const menu=el('div','ctx-menu');
  const item=(k,label,fn,cls)=>{ const b=el('button',cls||null,`<span class="k">${k}</span>${label}`); b.onclick=()=>{closeCtxMenu();fn();}; menu.append(b); };
  item('↩',t('reply'),()=>setReply(m));
  item('↪',t('forward'),()=>forwardMsg(m));
  item('☺',t('reaction'),()=>quickReact(m));
  if(m.type==='text'||m.type==='code'){ menu.append(el('div','sep')); item('⧉',t('copy'),()=>{navigator.clipboard.writeText(m.text);toast(t('copied'));}); }
  if(m.type==='text') item('🌐',t('translate'),()=>{ closeCtxMenu(); setTimeout(()=>translateMessage(m, x, y),50); });
  if(m.type==='text') item('🔊',t('speak'),()=>speak(m.text));
  if(m.from===ME.uid&&m.type==='text') item('✎',t('edit'),()=>startEdit(m));
  if(isAdmin()||activeMeta.type==='private'||activeMeta.type==='group') item('📌',t('pin'),()=>pinMessage(m));
  if(m.from===ME.uid||isAdmin()){ menu.append(el('div','sep')); item('🗑',t('delete'),()=>deleteMsg(m),'danger'); }
  document.body.append(menu);
  // позиционирование, чтобы не вылезало за экран
  const r=menu.getBoundingClientRect();
  let px=Math.min(x,innerWidth-r.width-8), py=Math.min(y,innerHeight-r.height-8);
  menu.style.left=Math.max(8,px)+'px'; menu.style.top=Math.max(8,py)+'px';
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),0);
}
function closeCtxMenu(){ document.querySelectorAll('.ctx-menu').forEach(n=>n.remove()); }

function replySummary(text,type){
  const map={photo:'📷 Фото',voice:'🎤 Голосовое',circle:'⭕ Кружок',video:'🎬 Видео',file:'📎 Файл',location:'📍 Гео',poll:'📊 Опрос',sticker:'🩷 Стикер',calc:'🧮 Калькулятор',code:'💻 Код'};
  return map[type]||text||'';
}

function renderBody(m){
  const c=el('div','body-inner');
  switch(m.type){
    case 'photo':
      c.innerHTML=`<img class="photo" src="${m.url}" onclick="window.open('${m.url}')">`+(m.text?`<div class="bd" style="margin-top:6px">${esc(m.text)}</div>`:''); break;
    case 'file':{
      const icon=m.mimeType&&m.mimeType.startsWith('image/')?'🖼️':m.mimeType&&m.mimeType.startsWith('video/')?'🎬':m.mimeType&&m.mimeType.startsWith('audio/')?'🎵':'📎';
      c.innerHTML=`<a href="${m.url}" target="_blank" download="${esc(m.fileName||'файл')}" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;background:var(--green-050);padding:10px 12px;border-radius:12px;border:1px solid var(--line)">
        <span style="font-size:28px">${icon}</span>
        <div><div style="font-weight:700">${esc(m.fileName||'Файл')}</div><div style="font-size:12px;color:var(--ink-soft)">${esc(m.fileSize||'')}</div></div>
        <span style="margin-left:auto;font-size:18px">⬇️</span></a>`; break;}
    case 'video':
      c.innerHTML=`<video class="vid" src="${m.url}" controls playsinline></video>`; break;
    case 'circle':
      c.innerHTML=`<video class="circle" src="${m.url}" controls loop playsinline webkit-playsinline x5-playsinline></video>`+(m.dur?`<div style="text-align:center;font-size:11px;color:var(--ink-soft);margin-top:2px">⭕ ${fmtDur(m.dur)}</div>`:''); break;
    case 'voice':{
      const dur=m.dur||0;
      const pid='v'+m.id;
      c.innerHTML=`<div class="vmsg">
        <button class="vplay" id="${pid}_b" onclick="toggleVoice('${pid}','${m.url}',${dur})">▶</button>
        <span class="vmic">🎤</span>
        <div class="vmid">
          <div class="vbar" onclick="seekVoice(event,'${pid}',${dur})"><div class="vtrack"><div class="vfill" id="${pid}_f"></div><div class="vdot" id="${pid}_d"></div></div></div>
          <div class="vtime"><span id="${pid}_t">${fmtDur(dur)}</span></div>
        </div>
      </div>`;
      const t=el('div');
      if(m.transcript){ t.className='transcript'; t.textContent='📝 '+m.transcript; c.append(t); }
      break;}
    case 'location':
      c.innerHTML=`<a class="loc" href="https://www.openstreetmap.org/?mlat=${m.lat}&mlon=${m.lng}#map=16/${m.lat}/${m.lng}" target="_blank">
        <div class="map">📍</div><div class="lbl">Геолокация · ${(+m.lat).toFixed(4)}, ${(+m.lng).toFixed(4)}</div></a>`; break;
    case 'sticker':
      c.className='sticker'; c.innerHTML=m.url?`<img src="${m.url}">`:esc(m.emoji); break;
    case 'poll':
      c.append(renderPoll(m)); break;
    case 'call':{
      const mine=m.from===ME.uid;
      const icon=m.missed?'📵':(m.video?'📹':'📞');
      const label=m.missed?(mine?'Звонок отменён':'Пропущенный звонок'):(mine?(m.video?'Исходящий видеозвонок':'Исходящий звонок'):(m.video?'Входящий видеозвонок':'Входящий звонок'));
      const dur=m.dur?' · '+fmtDur(m.dur):'';
      c.innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-weight:700;color:${m.missed?'var(--danger)':'var(--ink)'}">${icon} ${label}${dur}</div>`;
      break;}
    case 'calc':
      c.innerHTML=`<div class="calc-msg">🧮 ${esc(m.expr)} =\n<span class="res">${esc(m.result)}</span></div>`; break;
    case 'code':{
      c.innerHTML=`<div class="code-lang">${esc(m.lang||'код')}</div><pre class="code"><code class="language-${esc(m.lang||'')}">${esc(m.text)}</code></pre>`; break;}
    default:{
      // auto-detect code
      const det=looksLikeCode(m.text);
      if(det){
        c.innerHTML=`<div class="code-lang">${det.lang}</div><pre class="code"><code class="language-${det.lang}">${esc(m.text)}</code></pre>`;
      } else {
        const bd=el('div','bd',linkify(esc(m.text)));
        if(m.color) bd.style.color=m.color;
        c.append(bd);

        const tts=el('button','pill'); tts.textContent='🔊 Озвучить'; tts.style.marginTop='6px';
        tts.onclick=()=>speak(m.text); c.append(tts);
      }
    }
  }
  return c;
}
function linkify(s){ return s.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--green-700)">$1</a>'); }

/* code auto-detection */
function looksLikeCode(t){
  if(!t||t.length<12) return null;
  if(/```/.test(t)) return {lang:hljs.highlightAuto(t.replace(/```/g,'')).language||'plaintext'};
  const signals=[/\bdef\s+\w+\s*\(/,/\bfunction\s+\w+/,/=>/,/\bimport\s+\w+/,/<\/?[a-z]+[^>]*>/i,/\bclass\s+\w+/,/{[\s\S]*}/,/;\s*$/m,/\bprint\(/,/\bconsole\.log/,/#include/,/когда .* нажат/,/повторить \d+/];
  const hits=signals.filter(r=>r.test(t)).length;
  const lines=t.split('\n').length;
  if(hits>=2 || (hits>=1&&lines>=2&&/[{};()<>=]/.test(t))){
    try{ const r=hljs.highlightAuto(t); return {lang:r.language||'plaintext'}; }catch(e){ return {lang:'plaintext'}; }
  }
  return null;
}

/* TTS */
function speak(text){
  if(!('speechSynthesis' in window)) return toast('Озвучка не поддерживается');
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang= /[а-яё]/i.test(text)?'ru-RU':'en-US';
  speechSynthesis.speak(u);
}

/* ---- свой плеер голосовых (прогресс по нашей длительности, не по файлу) ---- */
const voiceAudios={};
function toggleVoice(pid,url,dur){
  // остановить другие
  Object.entries(voiceAudios).forEach(([k,a])=>{ if(k!==pid){ a.pause(); const b=$('#'+k+'_b'); if(b)b.textContent='▶'; }});
  let a=voiceAudios[pid];
  if(!a){
    a=new Audio(url); voiceAudios[pid]=a;
    a.ontimeupdate=()=>{
      // длительность берём НАШУ (dur), а не a.duration — она бывает кривой
      const total=dur||a.duration||1;
      const pct=Math.min(100,(a.currentTime/total)*100);
      const f=$('#'+pid+'_f'),d=$('#'+pid+'_d'),t=$('#'+pid+'_t');
      if(f)f.style.width=pct+'%'; if(d)d.style.left=pct+'%';
      if(t)t.textContent=fmtDur(Math.floor(a.currentTime))+' / '+fmtDur(dur);
    };
    a.onended=()=>{ const b=$('#'+pid+'_b'); if(b)b.textContent='▶'; const f=$('#'+pid+'_f'),d=$('#'+pid+'_d'),t=$('#'+pid+'_t'); if(f)f.style.width='0%'; if(d)d.style.left='0%'; if(t)t.textContent=fmtDur(dur); };
  }
  const btn=$('#'+pid+'_b');
  if(a.paused){ a.play(); if(btn)btn.textContent='⏸'; }
  else { a.pause(); if(btn)btn.textContent='▶'; }
}
function seekVoice(e,pid,dur){
  const a=voiceAudios[pid]; if(!a)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  a.currentTime=pct*(a.duration&&isFinite(a.duration)?a.duration:dur);
}

async function pushMsg(data){
  if(!canPost()) return toast('Нет прав для отправки');
  // если собеседник меня заблокировал — не даём отправить
  if(activeMeta.type==='private' && !activeMeta.saved){
    const other=Object.keys(activeMeta.members||{}).find(u=>u!==ME.uid);
    if(other && usersCache[other]?.blocked && usersCache[other].blocked[ME.uid])
      return toast('Вы не можете писать этому пользователю');
  }
  data.from=ME.uid; data.fromName=ME.name; data.ts=now();
  if(replyTo){ data.replyTo=replyTo.id; data.replyName=replyTo.fromName||usersCache[replyTo.from]?.name||''; data.replyText=replyTo.text||''; data.replyType=replyTo.type; }
  await db.ref('messages/'+activeChat).push(data);
  bumpChat(activeChat);
  // Update streak for private chats
  if(activeMeta&&activeMeta.type==='private'&&!activeMeta.saved){
    const otherUid=Object.keys(activeMeta.members||{}).find(u=>u!==ME.uid);
    if(otherUid) updateStreak(otherUid);
  }
  cancelReply();
}

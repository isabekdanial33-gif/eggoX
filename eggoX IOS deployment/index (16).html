/* ============================================================
   VOICE (mp4) + CIRCLE recording + live transcription
   ============================================================ */
let mediaRec=null, recChunks=[], recMode='voice', recStart=0, recTimer=null, recRecognition=null, recTranscript='';
function pickMime(video){
  // mp4 в приоритете — на Android/iOS у webm-аудио часто кривая длительность
  const opts = video
    ? ['video/mp4','video/mp4;codecs=h264,aac','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
    : ['audio/mp4','audio/mp4;codecs=mp4a.40.2','audio/aac','audio/webm;codecs=opus','audio/webm'];
  for(const m of opts) if(window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  return '';
}
let recStream=null;
async function startRecording(mode){
  closeAttach();
  recMode=mode; recTranscript=''; recCancelled=false;
  try{
    recStream=await navigator.mediaDevices.getUserMedia(mode==='circle'?{video:{facingMode:'user',width:480,height:480},audio:true}:{audio:true});
    const mime=pickMime(mode==='circle');
    mediaRec=new MediaRecorder(recStream, mime?{mimeType:mime}:undefined);
    recChunks=[];
    mediaRec.ondataavailable=e=>{ if(e.data&&e.data.size)recChunks.push(e.data); };
    mediaRec.onstop=()=>finishRecording();
    mediaRec.start();
    recStart=now();
    $('#recRing').style.display='flex';
    $('#composerWrap').style.display='none';
    // живое превью кружка
    const prev=$('#recPreview');
    if(mode==='circle'){ prev.style.display='block'; prev.srcObject=recStream; prev.play().catch(()=>{}); }
    else { prev.style.display='none'; prev.srcObject=null; }
    recTimer=setInterval(()=>{ const s=Math.floor((now()-recStart)/1000); $('#recTime').textContent=Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); },300);
    if(mode==='voice') startRecognition();
  }catch(e){ console.error(e); toast('Нет доступа к микрофону/камере'); $('#recRing').style.display='none'; $('#composerWrap').style.display='block'; }
}
function startRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ $('#recLive').textContent='(расшифровка не поддерживается)'; return; }
  recRecognition=new SR();
  recRecognition.lang='ru-RU'; recRecognition.continuous=true; recRecognition.interimResults=true;
  recRecognition.onresult=e=>{
    let txt=''; for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript;
    recTranscript=txt.trim(); $('#recLive').textContent='📝 '+recTranscript;
  };
  try{recRecognition.start();}catch(e){}
}
function stopRecording(){ try{ if(mediaRec&&mediaRec.state!=='inactive') mediaRec.stop(); }catch(e){ finishRecording(); } }
function cancelRecording(){ recCancelled=true; try{ if(mediaRec&&mediaRec.state!=='inactive') mediaRec.stop(); else finishRecording(); }catch(e){ finishRecording(); } }
let recCancelled=false, recStream2=null;
async function finishRecording(){
  clearInterval(recTimer);
  const durSec=Math.max(1,Math.round((now()-recStart)/1000));   // длительность, измеренная нами (надёжно)
  if(recRecognition){ try{recRecognition.stop();}catch(e){} recRecognition=null; }
  if(recStream){ recStream.getTracks().forEach(t=>t.stop()); recStream=null; }
  const prev=$('#recPreview'); if(prev){ prev.srcObject=null; prev.style.display='none'; }
  $('#recRing').style.display='none';
  $('#composerWrap').style.display='block';
  const wasCancelled=recCancelled; recCancelled=false;
  if(wasCancelled||!recChunks.length) return;
  const blob=new Blob(recChunks,{type:(mediaRec&&mediaRec.mimeType)||'audio/mp4'});
  const folder=recMode==='circle'?'circles':'voices';
  const url=await uploadBlob(blob,folder);
  if(recMode==='circle') pushMsg({type:'circle',url,dur:durSec});
  else pushMsg({type:'voice',url,transcript:recTranscript||'',dur:durSec});
}
function recordCircle(){ startRecording('circle'); }
function fmtDur(s){ s=s||0; return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); }

/* ============================================================
   CALCULATOR
   ============================================================ */
let calcExpr='', calcDisplay='0';
function openCalc(){
  closeAttach();
  calcExpr=''; calcDisplay='0';
  openModal('🧮 Калькулятор',`
    <div class="calc">
      <div class="calc-screen"><div class="expr" id="calcExpr"></div><div class="now" id="calcNow">0</div></div>
      <div class="calc-grid">
        <button class="fn" onclick="calcC()">C</button>
        <button class="fn" onclick="calcOp('(')">(</button>
        <button class="fn" onclick="calcOp(')')">)</button>
        <button class="op" onclick="calcOp('/')">÷</button>
        <button onclick="calcN('7')">7</button><button onclick="calcN('8')">8</button><button onclick="calcN('9')">9</button>
        <button class="op" onclick="calcOp('*')">×</button>
        <button onclick="calcN('4')">4</button><button onclick="calcN('5')">5</button><button onclick="calcN('6')">6</button>
        <button class="op" onclick="calcOp('-')">−</button>
        <button onclick="calcN('1')">1</button><button onclick="calcN('2')">2</button><button onclick="calcN('3')">3</button>
        <button class="op" onclick="calcOp('+')">+</button>
        <button onclick="calcN('0')">0</button><button onclick="calcN('.')">.</button>
        <button class="fn" onclick="calcBack()">⌫</button>
        <button class="eq" onclick="calcEq()">=</button>
      </div>
      <button class="btn" onclick="sendCalc()" style="margin-top:14px">📤 Отправить решение в чат</button>
    </div>`);
}
function calcN(n){ calcExpr+=n; refreshCalc(); }
function calcOp(o){ calcExpr+=o; refreshCalc(); }
function calcC(){ calcExpr=''; calcDisplay='0'; refreshCalc(); }
function calcBack(){ calcExpr=calcExpr.slice(0,-1); refreshCalc(); }
function refreshCalc(){
  $('#calcExpr').textContent=calcExpr.replace(/\*/g,'×').replace(/\//g,'÷');
  try{ const r=safeEval(calcExpr); if(r!==null&&calcExpr) calcDisplay=String(r); }catch(e){}
  $('#calcNow').textContent=calcExpr?calcDisplay:'0';
}
function calcEq(){
  try{ const r=safeEval(calcExpr); if(r===null)return; calcDisplay=String(r); $('#calcNow').textContent=calcDisplay; }
  catch(e){ toast(t('error')); }
}
function safeEval(expr){
  if(!expr)return null;
  if(!/^[\d+\-*/(). ]+$/.test(expr)) return null;
  try{ return Math.round(Function('"use strict";return('+expr+')')()*1e9)/1e9; }catch(e){ return null; }
}
function sendCalc(){
  const r=safeEval(calcExpr);
  if(r===null) return toast('Нет выражения');
  pushMsg({type:'calc',expr:calcExpr.replace(/\*/g,'×').replace(/\//g,'÷'),result:String(r)});
  closeModal();
}

let stkCtx,stkDrawing=false,stkColor='#3aa757';
function initStickerCanvas(){
  const cv=$('#stickerCanvas'); if(!cv)return;
  stkCtx=cv.getContext('2d'); stkCtx.lineWidth=8; stkCtx.lineCap='round'; stkCtx.lineJoin='round';
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*cv.width/r.width,y:(t.clientY-r.top)*cv.height/r.height}; };
  const start=e=>{ stkDrawing=true; const p=pos(e); stkCtx.beginPath(); stkCtx.moveTo(p.x,p.y); e.preventDefault(); };
  const move=e=>{ if(!stkDrawing)return; const p=pos(e); stkCtx.strokeStyle=stkColor; stkCtx.lineTo(p.x,p.y); stkCtx.stroke(); e.preventDefault(); };
  const end=()=>stkDrawing=false;
  cv.onmousedown=start; cv.onmousemove=move; cv.onmouseup=end; cv.onmouseleave=end;
  cv.ontouchstart=start; cv.ontouchmove=move; cv.ontouchend=end;
  $('#penColors').innerHTML=['#13351c','#3aa757','#e2574c','#2980b9','#8e44ad','#e67e22','#000000'].map(c=>`<button style="background:${c}" class="${c===stkColor?'on':''}" onclick="setPen('${c}',this)"></button>`).join('');
}

async function addByPhone(){
  const phone=normalizePhone($('#invPhone').value).replace('+','');
  if(phone.length<10) return toast('Введите корректный номер с кодом страны');
  if(phone===phoneKey) return toast('Это ваш номер');
  const isPriv=window._newType==='private';
  if(isPriv){ selectedUsers=new Set(); invitedPhones=[]; }
  // ищем uid через phoneIndex (после миграции)
  const idxSnap=await db.ref('phoneIndex/'+phone).get();
  if(idxSnap.exists()){
    const realUid=idxSnap.val();
    const uSnap=await db.ref('users/'+realUid).get();
    if(uSnap.exists()){ usersCache[realUid]=uSnap.val(); selectedUsers.add(realUid); }
    else if(!invitedPhones.includes(phone)) invitedPhones.push(phone);
  } else {
    // пользователь не зарегистрирован — записываем номер, создадим placeholder
    if(!invitedPhones.includes(phone)) invitedPhones.push(phone);
  }
  $('#invPhone').value='';
  renderChips(); toast('Добавлено ✓');

async function ensurePlaceholder(phone){
  // проверяем phoneIndex — вдруг пользователь уже зарегистрирован
  const idxSnap=await db.ref('phoneIndex/'+phone).get();
  if(idxSnap.exists()) return idxSnap.val();
  // создаём pending-запись с временным uid (он обновится когда юзер войдёт)
  const tmpId='pending_'+phone;
  const snap=await db.ref('users/'+tmpId).get();
  if(!snap.exists()) await db.ref('users/'+tmpId).set({uid:tmpId,phone,name:'+'+phone,pending:true,created:now()});
  // phoneIndex сразу на tmp — будет заменён реальным uid при первом входе
  await db.ref('phoneIndex/'+phone).set(tmpId);
  return tmpId;
}
async function createChat(){
  const type=window._newType;
  const inviteUids=[];
  for(const p of invitedPhones) inviteUids.push(await ensurePlaceholder(p));
  const targets=[...new Set([...selectedUsers,...inviteUids])];

  if(type==='private'){
    if(targets.length!==1) return toast('Для личного чата добавьте один номер');
    const other=targets[0];
    const existing=Object.values(chats).find(c=>c.type==='private'&&c.members?.[other]&&c.members?.[ME.uid]);
    if(existing){ closeModal(); openChat(existing.id); return; }
    const cid=rid('chat');
    const meta={type:'private',members:{[ME.uid]:true,[other]:true},names:{[ME.uid]:ME.name,[other]:userName(other)},createdBy:ME.uid,created:now()};
    await db.ref('chats/'+cid).set(meta);
    await db.ref('userChats/'+ME.uid+'/'+cid).set(true);
    await db.ref('userChats/'+other+'/'+cid).set(true);
    // я инициировал чат → этот человек сразу мой контакт
    ME.contacts=ME.contacts||{}; ME.contacts[other]=now();
    await db.ref('users/'+ME.uid+'/contacts/'+other).set(now());
    closeModal(); setTimeout(()=>openChat(cid),300);
  } else {
    const name=$('#ncName').value.trim();
    if(!name) return toast('Введите название '+(type==='channel'?'канала':'группы'));
    if(type==='group' && targets.length<1) return toast('Добавьте хотя бы один номер участника');
    const cid=rid('chat');
    const members={[ME.uid]:true}; targets.forEach(u=>members[u]=true);
    const meta={type,name,members,admins:{[ME.uid]:true},createdBy:ME.uid,created:now()};
    await db.ref('chats/'+cid).set(meta);
    const all=[ME.uid,...targets];
    await Promise.all(all.map(u=>db.ref('userChats/'+u+'/'+cid).set(true)));
    closeModal(); setTimeout(()=>openChat(cid),300);
    toast((type==='channel'?'Канал':'Группа')+' создан(а) ✓ ('+all.length+' уч.)');
    // Уведомление участникам что их добавили
    if(type==='group'){
      for(const u of targets){
        await db.ref('invites/'+u).push({type:'group',cid,name,from:ME.uid,fromName:ME.name,ts:now()});
      }
    }
  }
}

  const c=Object.values(chats).find(c=>c.type==='private'&&!c.saved&&c.members?.[uidv]&&c.members?.[ME.uid]);
  return c?c.id:null;
}
async function logCall(peer,{missed,video,dur,outgoing}){
  let cid=findPrivateChatWith(peer);
  if(!cid){ // создаём личный чат, если его не было
    cid=rid('chat');
    await db.ref('chats/'+cid).set({type:'private',members:{[ME.uid]:true,[peer]:true},names:{[ME.uid]:ME.name,[peer]:usersCache[peer]?.name||''},createdBy:ME.uid,created:now()});
    await db.ref('userChats/'+ME.uid+'/'+cid).set(true);
    await db.ref('userChats/'+peer+'/'+cid).set(true);
  }
  await db.ref('messages/'+cid).push({type:'call',from:ME.uid,fromName:ME.name,ts:now(),missed:!!missed,video:!!video,dur:dur||0,outgoing:!!outgoing});
  db.ref('chats/'+cid+'/updated').set(now());
}

let ringCtx=null, ringTimer=null, ringAudio=null, ringNodes=[];
function playRing(outgoing=false){
  stopRing();
  if(outgoing){
    // гудки исходящего — длинный тональный сигнал с паузами
    try{
      ringCtx=new (window.AudioContext||window.webkitAudioContext)();
      const beep=()=>{
        if(!ringCtx)return;
        const o=ringCtx.createOscillator(),g=ringCtx.createGain();
        o.type='sine'; o.frequency.value=440; o.connect(g); g.connect(ringCtx.destination);
        const t=ringCtx.currentTime;
        g.gain.setValueAtTime(.0001,t);
        g.gain.linearRampToValueAtTime(.2,t+.05);
        g.gain.setValueAtTime(.2,t+.95);
        g.gain.linearRampToValueAtTime(.0001,t+1.0);
        o.start(t); o.stop(t+1.1);
        ringNodes.push(o);
      };
      beep(); ringTimer=setInterval(beep,3000);
    }catch(e){}
    return;
  }
  const custom=localStorage.getItem('eggox_ringtone');
  if(custom){ try{ ringAudio=new Audio(custom); ringAudio.loop=true; ringAudio.play().catch(()=>{}); return; }catch(e){} }
  try{
    ringCtx=new (window.AudioContext||window.webkitAudioContext)();
    const melody=[[659,0],[784,.18],[988,.36],[784,.54],[659,.72],[523,.9]];
    const playOnce=()=>{
      if(!ringCtx)return;
      const t0=ringCtx.currentTime;
      melody.forEach(([f,off])=>{
        const o=ringCtx.createOscillator(),g=ringCtx.createGain();
        o.type='triangle'; o.frequency.value=f; o.connect(g); g.connect(ringCtx.destination);
        const t=t0+off;
        g.gain.setValueAtTime(.0001,t);
        g.gain.exponentialRampToValueAtTime(.22,t+.04);
        g.gain.exponentialRampToValueAtTime(.0001,t+.32);
        o.start(t); o.stop(t+.34);
        ringNodes.push(o);
      });
    };
    playOnce(); ringTimer=setInterval(playOnce,1600);
  }catch(e){}
}
function stopRing(){
  clearInterval(ringTimer); ringTimer=null;
  ringNodes.forEach(o=>{ try{o.stop();}catch(e){} }); ringNodes=[];
  if(ringCtx){ try{ringCtx.close();}catch(e){} ringCtx=null; }
  if(ringAudio){ try{ringAudio.pause(); ringAudio.currentTime=0;}catch(e){} ringAudio=null; }
}
// ICE candidate buffering — critical for reliability
function playRemoteVid(){ const rv=document.getElementById("remoteVid"); if(rv)rv.play().catch(()=>{}); }
function createPC(){
  const p=new RTCPeerConnection(getICE());
  // Используем один постоянный MediaStream для всех треков собеседника
  const remoteMS=new MediaStream();
  p._remoteStream=remoteMS;
  p.ontrack=e=>{
    console.log('[WebRTC] ontrack:', e.track.kind, 'readyState:', e.track.readyState);
    const rv=document.getElementById('remoteVid');
    if(!rv) return;
    // Добавляем трек в существующий поток (не заменяем srcObject!)
    // Убираем старый трек того же типа если был
    remoteMS.getTracks().filter(t=>t.kind===e.track.kind).forEach(t=>remoteMS.removeTrack(t));
    remoteMS.addTrack(e.track);
    // Назначаем srcObject только если ещё не назначен
    if(rv.srcObject!==remoteMS){
      rv.srcObject=remoteMS;
      rv.muted=false;
    }
    if(callIsVideo && e.track.kind==='video'){
      rv.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#000';
    }
  };
  p.oniceconnectionstatechange=()=>{
    const st=p.iceConnectionState;
    console.log('[call] ICE',st);
    if(st==='connected'||st==='completed'){
      const cs=$('#callStatus');
      if(cs&&!cs.textContent.startsWith(t('in_call'))){
        cs.textContent=t('in_call');
        if(!callAnswered){callAnswered=true;startCallTimer();}
        showVideos();
      }
    }
    if(st==='disconnected'){
      setTimeout(()=>{ if(pc===p&&p.iceConnectionState==='disconnected') doIceRestart(); },2500);
    }
    if(st==='failed'){ toast(t('connection_lost')); }
  };
  p.onconnectionstatechange=()=>console.log('[call] conn',p.connectionState);
  return p;
}
async function doIceRestart(){
  if(!pc||!callRef||!callOutgoing) return;
  try{ const o=await pc.createOffer({iceRestart:true}); await pc.setLocalDescription(o); await callRef.child('offer').set({type:o.type,sdp:o.sdp}); console.log('[call] ICE restart sent'); }
  catch(e){ console.error('ICE restart failed',e); }
}
async function addBufferedCandidates(){
  for(const c of pendingCandidates){ try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){} }
  pendingCandidates=[];
}
async function safeAddCandidate(raw){
  if(pc && pc.remoteDescription){ try{await pc.addIceCandidate(new RTCIceCandidate(raw));}catch(e){} }
  else pendingCandidates.push(raw);
}

// панель кнопок во время звонка
let micOn=true, camOn=true, speakerOn=true, blurOn=false, blurRAF=null, blurCanvas=null, blurVideo=null;
function callControls(){
  return `<button class="call-btn ${micOn?'':'muted'}" id="btnMic" onclick="toggleMic()" title="Микрофон">${micOn?'🎤':'🔇'}</button>
    ${callIsVideo?`<button class="call-btn ${camOn?'':'muted'}" id="btnCam" onclick="toggleCam()" title="Камера">${camOn?'📹':'🚫'}</button>
    <button class="call-btn" id="btnFlip" onclick="flipCamera()" title="Переключить камеру">🔄</button>
    <button class="call-btn ${blurOn?'muted':''}" id="btnBlur" onclick="toggleBlur()" title="Размытие фона">${blurOn?'🌫️':'😐'}</button>`:''}
    <button class="call-btn ${speakerOn?'':'muted'}" id="btnSpk" onclick="toggleSpeaker()" title="Динамик">${speakerOn?'🔊':'🔈'}</button>
    <button class="call-btn" onclick="inviteToCall()" title="Добавить участника">👤+</button>
    <button class="call-btn hang" onclick="hangup()" title="Завершить">📵</button>`;
}
let facingMode='user'; // 'user' = передняя, 'environment' = задняя
async function flipCamera(){
  if(!localStream||!callIsVideo) return;
  facingMode = facingMode==='user'?'environment':'user';
  try{
    const newStream = await navigator.mediaDevices.getUserMedia({video:{facingMode},audio:false});
    const newTrack = newStream.getVideoTracks()[0];
    // заменяем трек у собеседника
    const sender = pc && pc.getSenders().find(s=>s.track&&s.track.kind==='video');
    if(sender) await sender.replaceTrack(newTrack);
    // заменяем в localStream
    localStream.getVideoTracks().forEach(t=>t.stop());
    localStream.removeTrack(localStream.getVideoTracks()[0]);
    localStream.addTrack(newTrack);
    // обновляем превью
    const lv=document.getElementById('localVid');
    if(lv){ lv.srcObject=null; lv.srcObject=localStream; }
    toast(facingMode==='user'?'📷 Фронтальная камера':'📷 Основная камера');
  }catch(e){ toast(t('camera_error')); facingMode=facingMode==='user'?'environment':'user'; }
}
function toggleMic(){ micOn=!micOn; if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=micOn); $('#btnMic').className='call-btn '+(micOn?'':'muted'); $('#btnMic').textContent=micOn?'🎤':'🔇'; }
function toggleCam(){ camOn=!camOn; if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=camOn); const b=$('#btnCam'); if(b){b.className='call-btn '+(camOn?'':'muted'); b.textContent=camOn?'📹':'🚫';} }
function toggleSpeaker(){
  speakerOn=!speakerOn;
  const rv=$('#remoteVid');
  if(rv){ rv.muted=!speakerOn; if(rv.setSinkId){ /* выбор устройства ограничен браузером */ } }
  const b=$('#btnSpk'); if(b){ b.className='call-btn '+(speakerOn?'':'muted'); b.textContent=speakerOn?'🔊':'🔈'; }
}
function getVideoSender(){ return pc&&pc.getSenders?pc.getSenders().find(s=>s.track&&s.track.kind==='video'):null; }
async function toggleBlur(){
  if(!callIsVideo||!localStream) return;
  blurOn=!blurOn;
  const b=$('#btnBlur'); if(b){ b.className='call-btn '+(blurOn?'muted':''); b.textContent=blurOn?'🌫️':'😐'; }
  const sender=getVideoSender();
  try{
    if(blurOn){
      // рисуем камеру в canvas с размытием → отдаём как видеотрек собеседнику
      blurVideo=document.createElement('video'); blurVideo.muted=true; blurVideo.playsInline=true;
      blurVideo.srcObject=new MediaStream(localStream.getVideoTracks()); await blurVideo.play().catch(()=>{});
      blurCanvas=document.createElement('canvas'); blurCanvas.width=480; blurCanvas.height=480;
      const ctx=blurCanvas.getContext('2d');
      const draw=()=>{ if(!blurOn)return; try{ ctx.filter='blur(10px)'; ctx.drawImage(blurVideo,0,0,blurCanvas.width,blurCanvas.height); }catch(e){} blurRAF=requestAnimationFrame(draw); };
      draw();
      const out=blurCanvas.captureStream(25).getVideoTracks()[0];
      if(sender&&sender.replaceTrack) await sender.replaceTrack(out);
      const lv=$('#localVid'); if(lv)lv.style.filter='blur(8px)';
    } else {
      cancelAnimationFrame(blurRAF); blurRAF=null;
      const cam=localStream.getVideoTracks()[0];
      if(sender&&sender.replaceTrack&&cam) await sender.replaceTrack(cam);
      const lv=$('#localVid'); if(lv)lv.style.filter='';
    }
  }catch(e){ console.error(e); toast('Размытие не поддерживается этим браузером'); blurOn=false; }
}

async function startCall(video){
  if(!activeMeta||activeMeta.type!=='private') return toast(t('calls_private_only'));
  callPeer=Object.keys(activeMeta.members||{}).find(u=>u!==ME.uid);
  if(!callPeer) return toast('Нет собеседника');
  callIsVideo=video; callId=rid('call'); pendingCandidates=[];
  micOn=true; camOn=true; speakerOn=true; callAnswered=false; callOutgoing=true;
  const u=usersCache[callPeer]||{name:chatTitle(activeMeta)};
  $('#callName').textContent=u.name;
  $('#callAvatar').innerHTML=u.avatar?`<img src="${u.avatar}">`:initials(u.name);
  $('#callStatus').textContent='Вызов…';
  $('#callActions').innerHTML=callControls();
  $('#callVideos').style.display='none';
  $('#callOverlay').classList.add('open');
  try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video}); }
  catch(e){ console.error(e); toast('Нет доступа к микрофону/камере'); endCallUI(); return; }
  if(video){
    $('#callVideos').style.display='block';
    const lv=$('#localVid');
    lv.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:0;z-index:1;object-fit:cover;background:#000';
    lv.srcObject=localStream; lv.play().catch(()=>{});
  }
  playRing(true); // гудки исходящего
  await refreshIce(); // свежие TURN credentials
  pc=createPC();
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  callRef=db.ref('callSessions/'+callId);
  pc.onicecandidate=e=>{ if(e.candidate) callRef.child('callerCandidates').push(e.candidate.toJSON()); };
  const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:video});
  await pc.setLocalDescription(offer);
  await callRef.child('offer').set({type:offer.type,sdp:offer.sdp});
  await db.ref('calls/'+callPeer).push({from:ME.uid,fromName:ME.name,callId,video,ts:now()});
  callRef.child('answer').on('value',async s=>{
    const ans=s.val();
    if(ans&&pc&&!pc.currentRemoteDescription){
      await pc.setRemoteDescription(new RTCSessionDescription(ans));
      await addBufferedCandidates();
      stopRing();
      callAnswered=true;
      $('#callStatus').textContent=t('in_call'); startCallTimer();
      showVideos();
    }
  });
  callRef.child('calleeCandidates').on('child_added',s=>{ if(pc) safeAddCandidate(s.val()); });
  callRef.child('ended').on('value',s=>{ if(s.val()) endCallUI(); });
}

async function acceptCall(){
  stopRing(); $('#callBanner').classList.remove('open');
  const c=callIncomingData; if(!c) return;
  pendingCandidates=[]; callIsVideo=c.video; callId=c.callId; callPeer=c.from;
  if(c.group){ groupCallId=c.callId; await createGroupPeer(c.from, c.callId, false); db.ref('calls/'+ME.uid+'/'+c.key).remove(); return; }
  micOn=true; camOn=true; speakerOn=true; callAnswered=true; callOutgoing=false;
  const u=usersCache[c.from]||{name:c.fromName||''};
  $('#callName').textContent=u.name;
  $('#callAvatar').innerHTML=u.avatar?`<img src="${u.avatar}">`:initials(u.name);
  $('#callStatus').textContent='Соединение…';
  $('#callActions').innerHTML=callControls();
  $('#callVideos').style.display='none';
  $('#callOverlay').classList.add('open');
  try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:c.video}); }
  catch(e){ toast('Нет доступа к устройствам'); declineCall(); return; }
  if(c.video){
    $('#callVideos').style.display='block';
    const lv=$('#localVid');
    lv.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:0;z-index:1;object-fit:cover;background:#000';
    lv.srcObject=localStream; lv.play().catch(()=>{});
  }
  await refreshIce(); // свежие TURN credentials
  pc=createPC(); // ontrack внутри
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  callRef=db.ref('callSessions/'+c.callId);
  pc.onicecandidate=e=>{ if(e.candidate) callRef.child('calleeCandidates').push(e.candidate.toJSON()); };
  const offSnap=await callRef.child('offer').get();
  await pc.setRemoteDescription(new RTCSessionDescription(offSnap.val()));
  await addBufferedCandidates();
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await callRef.child('answer').set({type:answer.type,sdp:answer.sdp});
  callRef.child('callerCandidates').on('child_added',s=>{ if(pc) safeAddCandidate(s.val()); });
  callRef.child('ended').on('value',s=>{ if(s.val()) endCallUI(); });
  db.ref('calls/'+ME.uid+'/'+c.key).remove();
  $('#callStatus').textContent=t('in_call'); startCallTimer(); showVideos();
}
function showVideos(){
  const rv=document.getElementById('remoteVid');
  const lv=document.getElementById('localVid');
  if(!callIsVideo){
    // Аудиозвонок: remoteVid 1x1px, звук идёт
    if(rv&&rv.srcObject&&rv.paused) rv.play().catch(()=>{});
    return;
  }
  $('#callVideos').style.display='block';
  if(rv){
    rv.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#000';
    if(rv.srcObject&&rv.paused) rv.play().catch(()=>{});
  }
  if(lv){
    lv.style.cssText='position:absolute;width:120px;height:160px;right:16px;top:16px;border-radius:14px;border:2px solid rgba(255,255,255,.5);object-fit:cover;z-index:2;background:#000;transform:scaleX(-1)';
    if(lv.srcObject!==localStream){ lv.srcObject=localStream; }
    if(lv.paused) lv.play().catch(()=>{});
  }
}
function startCallTimer(){
  callStart=now();
  callTimer=setInterval(()=>{ const s=Math.floor((now()-callStart)/1000); const st=document.getElementById('callStatus'); if(st) st.textContent='В разговоре · '+fmtDur(s); },1000);
}
function declineCall(){
  stopRing();
  const c=callIncomingData;
  if(c){ db.ref('callSessions/'+c.callId+'/ended').set(true); db.ref('calls/'+ME.uid+'/'+c.key).remove();
    logCall(c.from,{missed:true,video:c.video,outgoing:false}); } // я отклонил → пропущенный
  endCallUI();
}
function hangup(){
  if(callId) db.ref('callSessions/'+callId+'/ended').set(true);
  const dur=callAnswered?Math.round((now()-callStart)/1000):0;
  if(callPeer){
    if(callAnswered) logCall(callPeer,{missed:false,video:callIsVideo,dur,outgoing:callOutgoing});
    else if(callOutgoing) logCall(callPeer,{missed:true,video:callIsVideo,outgoing:true}); // не дозвонился
  }
  endCallUI();
}
async function inviteToCall(){
  if(!callId&&!groupCallId) return toast('Сначала начните звонок');
  const cid=activeChat; if(!cid) return toast('Откройте чат с нужным человеком');
  const other=Object.keys(activeMeta?.members||{}).find(u=>u!==ME.uid&&u!==callPeer);
  if(!other) return toast('Нет других участников в чате');
  const gid=groupCallId||callId;
  groupCallId=gid; groupCallVideo=callIsVideo;
  // Уведомляем нового участника
  await db.ref('calls/'+other).push({from:ME.uid,fromName:ME.name,callId:gid,video:callIsVideo,group:true,ts:now()});
  // Создаём peer connection с новым участником
  await createGroupPeer(other, gid, true);
  toast('Приглашение отправлено 📞');
}

async function createGroupPeer(uid, gid, initiator){
  if(groupPeers[uid]) return; // уже подключены
  await refreshIce();
  const p=createPC(); // берёт ontrack из createPC
  groupPeers[uid]=p;
  if(localStream) localStream.getTracks().forEach(t=>p.addTrack(t,localStream));
  const ref=db.ref('groupSessions/'+gid+'/peers/'+ME.uid+'_'+uid);
  p.onicecandidate=e=>{ if(e.candidate) ref.child('cands_'+ME.uid).push(e.candidate.toJSON()); };
  // видео для нового участника
  p.ontrack=e=>{
    const rv=document.getElementById('remoteVid');
    if(!rv) return;
    const remoteMS=p._remoteStream||(p._remoteStream=new MediaStream());
    remoteMS.getTracks().filter(t=>t.kind===e.track.kind).forEach(t=>remoteMS.removeTrack(t));
    remoteMS.addTrack(e.track);
    if(rv.srcObject!==remoteMS){ rv.srcObject=remoteMS; rv.muted=false; }
    if(callIsVideo) rv.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#000';
    showVideos();
  };
  if(initiator){
    const offer=await p.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:callIsVideo});
    await p.setLocalDescription(offer);
    await ref.child('offer').set({type:offer.type,sdp:offer.sdp});
    ref.child('answer').on('value',async s=>{
      const ans=s.val();
      if(ans&&p&&!p.currentRemoteDescription){
        await p.setRemoteDescription(new RTCSessionDescription(ans));
        for(const c of (pendingCandidates||[])){try{await p.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}
      }
    });
  } else {
    const offSnap=await ref.child('offer').get();
    if(!offSnap.exists()) return;
    await p.setRemoteDescription(new RTCSessionDescription(offSnap.val()));
    const answer=await p.createAnswer();
    await p.setLocalDescription(answer);
    await ref.child('answer').set({type:answer.type,sdp:answer.sdp});
  }
  ref.child('cands_'+uid).on('child_added',s=>{
    if(p.remoteDescription){ try{p.addIceCandidate(new RTCIceCandidate(s.val()));}catch(e){} }
  });
}

// Групповой звонок из группы
async function startGroupCall(video){
  if(!activeMeta||activeMeta.type!=='group') return toast('Групповые звонки только в группах');
  const members=Object.keys(activeMeta.members||{}).filter(u=>u!==ME.uid);
  if(!members.length) return toast('Нет участников');
  groupCallId=rid('gcall'); groupCallVideo=video; groupPeers={};
  callIsVideo=video;
  try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video}); }
  catch(e){ return toast('Нет доступа к устройствам'); }
  micOn=true; camOn=true; speakerOn=true; callAnswered=true;
  $('#callName').textContent=chatTitle(activeMeta)+' · Групповой';
  $('#callAvatar').textContent='👥';
  $('#callStatus').textContent='Соединение…';
  $('#callActions').innerHTML=callControls();
  if(video){ $('#callVideos').style.display='block'; const lv=$('#localVid'); lv.srcObject=localStream; lv.play().catch(()=>{}); }
  $('#callOverlay').classList.add('open');
  // Приглашаем всех участников
  for(const uid of members){
    await db.ref('calls/'+uid).push({from:ME.uid,fromName:ME.name,callId:groupCallId,video,group:true,groupName:chatTitle(activeMeta),ts:now()});
    await createGroupPeer(uid, groupCallId, true);
  }
  startCallTimer();
}

function endCallUI(){
  stopRing(); clearInterval(callTimer);
  $('#callBanner').classList.remove('open');
  try{ pc&&pc.close(); }catch(e){} pc=null;
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(callRef){ callRef.off(); callRef=null; }
  $('#callOverlay').classList.remove('open');
  const lv=document.getElementById('localVid');
  const rv=document.getElementById('remoteVid');
  if(lv){ lv.srcObject=null; lv.style.cssText=''; }
  if(rv){ rv.srcObject=null; rv.style.cssText='position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;z-index:0;background:#000'; }
  $('#callVideos').style.display='none';
  micOn=true; camOn=true; speakerOn=true; callAnswered=false; callOutgoing=false;
  blurOn=false; if(blurRAF){cancelAnimationFrame(blurRAF);blurRAF=null;} blurCanvas=null; blurVideo=null;
  pendingCandidates=[];
  callIncomingData=null; callId=null; callPeer=null;
  // групповые peer connections
  Object.values(groupPeers).forEach(p=>{ try{p.close();}catch(e){} });
  groupPeers={}; groupCallId=null;
}

/* ============================================================
   STORIES / ИСТОРИИ — Instagram / WhatsApp style (24 часа)
   ============================================================ */
let storiesData={}, storyUserList=[], storyUserIdx=0, viewQueue=[], viewIdx=0, storyTimer=null, storyPaused=false, storyBarStart=null, storyBarElapsed=0;

function listenStories(){
  db.ref('stories').on('value',s=>{ storiesData=s.val()||{}; renderStories(); });
}

function renderStories(){
  const bar=$('#storiesBar'); if(!bar)return;
  const cutoff=now()-24*3600*1000;
  const contacts=new Set([ME.uid]);
  Object.values(chats).forEach(c=>{ if(c.type==='private') Object.keys(c.members||{}).forEach(u=>contacts.add(u)); });

  // Build ordered list: my stories first, then others with unseen first
  const withStories=[...contacts].filter(uid=>{
    const items=Object.entries(storiesData[uid]||{}).filter(([,v])=>v.ts>cutoff);
    return items.length>0;
  });
  withStories.sort((a,b)=>{
    if(a===ME.uid) return -1; if(b===ME.uid) return 1;
    const aS=storyIsSeen(a); const bS=storyIsSeen(b);
    if(!aS && bS) return -1; if(aS && !bS) return 1; return 0;
  });
  storyUserList=withStories;

  let html=`<div class="story-add" onclick="addStory()"><div class="plus">＋</div><div class="story-lbl">Моя</div></div>`;
  withStories.forEach(uidv=>{
    const u=uidv===ME.uid?ME:(usersCache[uidv]||{name:'?'});
    const seen=storyIsSeen(uidv);
    html+=`<div class="story-item" onclick="openStoriesUser('${uidv}')">
      <div class="story-ring ${seen?'seen':''}">
        <div class="inner" style="background:${avatarColor(u.name)}">${u.avatar?`<img src="${u.avatar}">`:initials(u.name)}</div>
      </div>
      <div class="story-lbl">${uidv===ME.uid?'Моя':esc(u.name)}</div>
    </div>`;
  });
  bar.innerHTML=html;
}

function storyIsSeen(uidv){
  const cutoff=now()-24*3600*1000;
  const items=Object.entries(storiesData[uidv]||{}).filter(([,v])=>v.ts>cutoff);
  if(!items.length) return true;
  const last=items.sort((a,b)=>b[1].ts-a[1].ts)[0];
  return localStorage.getItem('story_seen_'+uidv)===String(last[1].ts);
}

function openStoriesUser(uidv){
  // Find index in storyUserList; if not there (e.g. my story has no items yet), start with 0
  storyUserIdx=Math.max(0,storyUserList.indexOf(uidv));
  loadUserStories(storyUserIdx);
  $('#storyView').classList.add('open');
  document.body.style.overflow='hidden';
}

function loadUserStories(idx){
  storyUserIdx=idx;
  const uidv=storyUserList[idx]; if(!uidv){ closeStory(); return; }
  const cutoff=now()-24*3600*1000;
  viewQueue=Object.entries(storiesData[uidv]||{}).filter(([,v])=>v.ts>cutoff).map(([id,v])=>({id,uidv,...v})).sort((a,b)=>a.ts-b.ts);
  viewIdx=0;
  showStory();
}

function showStory(){
  clearTimeout(storyTimer); storyPaused=false; storyBarElapsed=0;
  const s=viewQueue[viewIdx]; if(!s){ advanceStoryUser(1); return; }
  const uidv=s.uidv;
  const u=uidv===ME.uid?ME:(usersCache[uidv]||{name:'?'});
  const isMine=uidv===ME.uid;

  // Progress bars
  $('#storyBars').innerHTML=viewQueue.map((_,i)=>`<i id="sbar${i}"><b id="sbfill${i}" style="width:${i<viewIdx?'100':'0'}%"></b></i>`).join('');

  // Header
  const timeAgo=storyTimeAgo(s.ts);
  $('#storyHd').innerHTML=`
    <div class="sav" style="background:${avatarColor(u.name)}">${u.avatar?`<img src="${u.avatar}">`:initials(u.name)}</div>
    <div class="smeta">
      <div class="sname">${esc(u.name)}</div>
      <div class="stime">${timeAgo}</div>
    </div>
    ${isMine?`<button class="iconbtn" style="background:rgba(255,255,255,.2);color:#fff;width:34px;height:34px;margin-right:38px" onclick="delStory('${s.id}')">🗑️</button>`:''}
  `;

  // Media
  const m=$('#storyMedia'); m.innerHTML='';
  let node;
  if(s.video){
    node=document.createElement('video');
    node.src=s.url; node.autoplay=true; node.playsInline=true; node.controls=false; node.loop=false;
    node.muted=false;
    node.onended=()=>nextStory();
    node.onloadedmetadata=()=>{ const dur=(node.duration&&isFinite(node.duration)?node.duration:10)*1000; startStoryBar(dur); };
  } else {
    node=document.createElement('img');
    node.src=s.url;
    node.onload=()=>startStoryBar(5000);
  }
  node.style.filter=s.filterCss||'none';
  m.appendChild(node);

  // Text overlay
  const ov=$('#storyTextOv');
  if(s.text){
    ov.textContent=s.text;
    ov.style.cssText=`left:${s.tx!=null?s.tx:50}%;top:${s.ty!=null?s.ty:80}%;color:${s.textColor||'#fff'};font-family:${s.textFont||'inherit'};display:block`;
  } else { ov.style.display='none'; }

  // Caption
  const cap=$('#storyCap');
  const capParts=[s.title?`<b>${esc(s.title)}</b>`:'',s.caption?esc(s.caption):''].filter(Boolean).join('<br>');
  cap.innerHTML=capParts;

  // Views (my stories)
  const views=$('#storyViews');
  if(isMine){
    const viewers=Object.keys(s.views||{}).length;
    views.innerHTML=`👁 ${viewers}`;
    views.onclick=()=>showStoryViewers(s);
    views.style.cursor='pointer';
  } else { views.innerHTML=''; views.onclick=null; views.style.cursor='default'; }

  // Mark as viewed
  if(!isMine){
    db.ref(`stories/${uidv}/${s.id}/views/${ME.uid}`).set(true);
    localStorage.setItem('story_seen_'+uidv, String(viewQueue[viewQueue.length-1].ts));
  } else {
    localStorage.setItem('story_seen_'+uidv, String(viewQueue[viewQueue.length-1].ts));
  }

  // Reply bar / emoji bar
  const rb=$('#storyReplyBar');
  if(isMine){
    // My story: show total reactions
    const reacts=s.reactions||{};
    const counts={}; Object.values(reacts).forEach(e=>counts[e]=(counts[e]||0)+1);
    const rhtml=Object.keys(counts).length
      ?Object.entries(counts).map(([e,n])=>`<span style="background:rgba(255,255,255,.2);color:#fff;padding:5px 10px;border-radius:20px;font-weight:700">${e} ${n}</span>`).join('')
      :'<span style="color:rgba(255,255,255,.5);font-size:13px">Пока нет реакций</span>';
    rb.innerHTML=`<div style="display:flex;gap:6px;flex-wrap:wrap">${rhtml}</div>`;
  } else {
    // Other's story: emoji picker + text reply
    const mine=(s.reactions||{})[ME.uid];
    rb.innerHTML=`
      <div class="story-emojis">${['❤️','😂','😮','😢','🔥','👍'].map(e=>`<button onclick="reactStory('${uidv}','${s.id}','${e}')" style="${mine===e?'transform:scale(1.25);background:rgba(255,255,255,.35)':''}">${e}</button>`).join('')}</div>
      <input id="storyReplyInp" placeholder="Ответить…" onkeydown="if(event.key==='Enter')sendStoryReply('${uidv}','${s.id}')" onfocus="pauseStory()" onblur="resumeStory()">
      <button class="srbtn" onclick="sendStoryReply('${uidv}','${s.id}')">➤</button>
    `;
  }
  renderStories(); // update seen rings
}

function startStoryBar(durationMs){
  const bar=$('#sbfill'+viewIdx); if(!bar)return;
  storyBarElapsed=0; storyBarStart=performance.now();
  bar.style.transition='none'; bar.style.width='0%';
  requestAnimationFrame(()=>{
    bar.style.transition=`width ${durationMs}ms linear`;
    bar.style.width='100%';
  });
  storyTimer=setTimeout(nextStory, durationMs);
}

function pauseStory(){
  if(storyPaused)return; storyPaused=true;
  clearTimeout(storyTimer);
  const bar=$('#sbfill'+viewIdx); if(!bar)return;
  const cs=getComputedStyle(bar);
  const w=parseFloat(cs.width)/parseFloat(getComputedStyle(bar.parentElement).width)*100;
  bar.style.transition='none'; bar.style.width=w+'%';
  const vid=$('#storyMedia video'); if(vid)vid.pause();
}
function resumeStory(){
  if(!storyPaused)return; storyPaused=false;
  const vid=$('#storyMedia video'); if(vid){ vid.play().catch(()=>{}); return; } // video auto-advances via onended
  // for images, restart a shortened timer
  const bar=$('#sbfill'+viewIdx); if(!bar)return;
  const w=parseFloat(bar.style.width);
  const remaining=(100-w)/100*5000;
  bar.style.transition=`width ${remaining}ms linear`; bar.style.width='100%';
  storyTimer=setTimeout(nextStory,remaining);
}

// Tap hold = pause; tap release = prev/next
let storyTapT=null;
function storyTapStart(e,side){
  storyTapT=setTimeout(()=>{ storyTapT='held'; pauseStory(); },200);
}
function storyTapEnd(e,side){
  if(storyTapT==='held'){ resumeStory(); storyTapT=null; return; }
  clearTimeout(storyTapT); storyTapT=null;
  if(side==='l') prevStory(); else nextStory();
}

function nextStory(){
  clearTimeout(storyTimer); storyPaused=false;
  viewIdx++;
  if(viewIdx>=viewQueue.length) advanceStoryUser(1);
  else showStory();
}
function prevStory(){
  clearTimeout(storyTimer); storyPaused=false;
  if(viewIdx>0){ viewIdx--; showStory(); }
  else advanceStoryUser(-1);
}
function advanceStoryUser(dir){
  const next=storyUserIdx+dir;
  if(next<0||next>=storyUserList.length){ closeStory(); return; }
  loadUserStories(next);
}
function closeStory(){
  clearTimeout(storyTimer); storyPaused=false;
  $('#storyView').classList.remove('open');
  document.body.style.overflow='';
  const m=$('#storyMedia'); if(m)m.innerHTML='';
}

function storyTimeAgo(ts){
  const diff=now()-ts;
  if(diff<60000)return 'только что';
  if(diff<3600000)return Math.floor(diff/60000)+' мин назад';
  if(diff<7200000)return '1 ч назад';
  return Math.floor(diff/3600000)+' ч назад';
}

async function sendStoryReply(uidv,sid){
  const inp=$('#storyReplyInp'); if(!inp)return;
  const text=inp.value.trim(); if(!text)return;
  inp.value='';
  // Send as a message in the private chat with that user
  const chatId=[ME.uid,uidv].sort().join('_');
  const existing=chats[chatId];
  if(!existing){
    const meta={type:'private',members:{[ME.uid]:true,[uidv]:true},names:{[ME.uid]:ME.name,[uidv]:usersCache[uidv]?.name||''},createdBy:ME.uid,created:now()};
    await db.ref('chats/'+chatId).set(meta);
    await db.ref('userChats/'+ME.uid+'/'+chatId).set(true);
    await db.ref('userChats/'+uidv+'/'+chatId).set(true);
  }
  await db.ref('messages/'+chatId).push({from:ME.uid,fromName:ME.name,text:'📸 '+text,ts:now(),type:'text'});
  toast('Ответ отправлен ✓');
  resumeStory();
}

function reactStory(uidv,id,emoji){
  const ref=db.ref(`stories/${uidv}/${id}/reactions/${ME.uid}`);
  ref.get().then(s=>{ if(s.val()===emoji)ref.remove(); else ref.set(emoji); });
  toast(emoji);
  // re-render the emoji bar with updated selection
  setTimeout(()=>{ if($('#storyView').classList.contains('open')) showStory(); },300);
}

async function showStoryViewers(s){
  pauseStory();
  const viewers=Object.keys(s.views||{});
  const names=viewers.map(u=>{
    const usr=usersCache[u]||{name:'Пользователь'};
    return `<div class="member-row"><div class="avatar" style="width:34px;height:34px;font-size:12px;background:${avatarColor(usr.name)}">${usr.avatar?`<img src="${usr.avatar}">`:initials(usr.name)}</div><div class="nm">${esc(usr.name)}</div></div>`;
  }).join('') || '<p style="color:rgba(255,255,255,.6);padding:8px">Никто ещё не смотрел</p>';
  await eggAlert(`👁 Просмотрели (${viewers.length}):\n`+viewers.map(u=>(usersCache[u]||{name:'?'}).name).join(', ')||'Никто',{title:'Просмотры',icon:'👁'});
  resumeStory();
}

async function delStory(id){
  pauseStory();
  const ok=await eggConfirm('Удалить эту историю?',{title:'Удалить историю',icon:'🗑️',danger:true});
  if(ok){ await db.ref('stories/'+ME.uid+'/'+id).remove(); closeStory(); renderStories(); }
  else resumeStory();
}

  {id:'bw',name:'Ч/Б',css:'grayscale(1) contrast(1.1)'},

const STORY_FONTS=[

];
const STORY_TEXT_COLORS=['#ffffff','#13351c','#3aa757','#e2574c','#f5c518','#2980b9','#8e44ad','#000000'];
function openStoryEditor(){

  setTimeout(()=>{ setStoryFilter(storyDraft.filter||'none',document.querySelector('.modal-b .pill')); applyStoryTextStyle(); initStoryDrag(); },60);

function applyStoryTextStyle(){
  const o=$('#seTextOverlay'),d=storyDraft; if(!o)return;
  o.style.color=d.textColor;
  o.style.fontFamily=(STORY_FONTS.find(f=>f.id===d.textFont)||STORY_FONTS[0]).css;
  o.style.left=d.tx+'%'; o.style.top=d.ty+'%';
}
function setStoryTextColor(c,btn){ storyDraft.textColor=c; applyStoryTextStyle(); }
function setStoryFont(id,btn){ storyDraft.textFont=id; applyStoryTextStyle(); }
function initStoryDrag(){
  const o=$('#seTextOverlay'),stage=$('#seStage'); if(!o||!stage)return;
  let drag=false;
  const move=e=>{ if(!drag)return; const t=e.touches?e.touches[0]:e; const r=stage.getBoundingClientRect();
    storyDraft.tx=Math.max(5,Math.min(95,(t.clientX-r.left)/r.width*100));
    storyDraft.ty=Math.max(5,Math.min(95,(t.clientY-r.top)/r.height*100));
    o.style.left=storyDraft.tx+'%'; o.style.top=storyDraft.ty+'%'; e.preventDefault(); };
  const down=e=>{ drag=true; e.preventDefault(); };
  const up=()=>drag=false;
  o.onmousedown=down; o.ontouchstart=down;
  window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
}
function setStoryFilter(id,btn){
  storyDraft.filter=id;
  const f=STORY_FILTERS.find(x=>x.id===id);
  const m=$('#seMedia'); if(m)m.style.filter=f.css;
  document.querySelectorAll('.modal-b .pill').forEach(b=>{ if(b.textContent&&STORY_FILTERS.some(x=>x.name===b.textContent)) b.style.background=''; });
  if(btn)btn.style.background='var(--green-300)';
}
function updateStoryText(){ const o=$('#seTextOverlay'); if(o)o.textContent=$('#seText').value; }
async function publishStory(){
  const d=storyDraft;
  d.text=($('#seText').value||'').trim(); d.title=($('#seTitle').value||'').trim(); d.desc=($('#seDesc').value||'').trim();
  closeModal();
  toast('Публикуем историю…');
  const url=await uploadBlob(d.blob,'stories');
  const f=STORY_FILTERS.find(x=>x.id===d.filter);
  const ref=await db.ref('stories/'+ME.uid).push({
    url,video:d.video,filterCss:f?f.css:'none',
    text:d.text||'',textColor:d.textColor,
    textFont:(STORY_FONTS.find(x=>x.id===d.textFont)||STORY_FONTS[0]).css,
    tx:d.tx,ty:d.ty,title:d.title||'',caption:d.desc||'',ts:now()
  });
  URL.revokeObjectURL(d.url); storyDraft=null;
  toast('История опубликована 📸');
}

async function publishPost(){

/* ---- комментарии с ответами ---- */
let commentsPostId=null, commentReplyTo=null;
function openComments(pid){
  commentsPostId=pid; commentReplyTo=null;
  openModal('💬 Комментарии',`<div id="commentsList" style="max-height:50vh;overflow:auto">Загрузка…</div>
    <div id="cReplyBar" style="display:none;font-size:13px;color:var(--green-700);font-weight:700;padding:6px 0"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <input class="inp" id="commentInput" placeholder="Ваш комментарий…" style="flex:1">
      <button class="btn mini" style="margin-top:0" onclick="sendComment()">➤</button>
    </div>`);
  db.ref('posts/'+pid+'/comments').on('value',s=>renderComments(s.val()||{}));
}
function renderComments(c){
  const box=$('#commentsList'); if(!box)return;
  const all=Object.entries(c).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
  if(!all.length){ box.innerHTML='<p style="text-align:center;color:var(--ink-soft);padding:14px">Пока нет комментариев. Будьте первым!</p>'; return; }
  const roots=all.filter(x=>!x.parent);
  const node=(cm,depth)=>{
    const u=usersCache[cm.author]||{name:cm.authorName||'?'};
    const replies=all.filter(x=>x.parent===cm.id);
    const parentCm=cm.parent?all.find(x=>x.id===cm.parent):null;
    const parentName=parentCm?(parentCm.authorName||(usersCache[parentCm.author]||{}).name||''):null;
    const div=document.createElement('div');
    div.className='comment-item';
    div.dataset.id=cm.id;
    div.innerHTML=`
      <div class="comment-row">
        <div class="avatar" style="width:32px;height:32px;font-size:12px;flex:none;background:${avatarColor(u.name||'?')}">${u.avatar?`<img src="${u.avatar}">`:initials(u.name||'?')}</div>
        <div class="comment-body">
          <div class="comment-name">${esc(cm.authorName||u.name)} ${cm.pinned?'<span class="pill">📌</span>':''}</div>
          ${parentName?`<div class="comment-reply-to">↩ в ответ ${esc(parentName)}</div>`:''}
          <div class="comment-text">${esc(cm.text||'')}</div>
          ${cm.videoReply?`<video src="${cm.videoReply}" controls style="max-width:200px;border-radius:10px;margin-top:4px;display:block"></video><div style="font-size:11px;color:var(--green-700)">🎬 Видео-ответ автора</div>`:''}
          <div class="comment-actions">
            <span>${fmtDate(cm.ts)}</span>
            <button onclick="replyToComment('${cm.id}','${esc(cm.authorName||u.name||'?')}')" style="color:var(--green-700);font-weight:700">Ответить</button>
            <button onclick="commentMenu('${cm.id}')" style="color:var(--ink-soft)">⋯</button>
          </div>
        </div>
      </div>`;
    if(replies.length){
      const repDiv=document.createElement('div');
      repDiv.className='comment-replies';
      replies.forEach(r=>repDiv.appendChild(node(r,depth+1)));
      div.appendChild(repDiv);
    }
    return div;
  };
  box.innerHTML='';
  roots.forEach(cm=>box.appendChild(node(cm,0)));
}
function replyToComment(id,name){ commentReplyTo=id; $('#cReplyBar').style.display='block'; $('#cReplyBar').textContent='↩ Ответ для '+name; $('#commentInput').focus(); }
async function sendComment(){
  const t=$('#commentInput').value.trim(); if(!t)return;
  const c={author:ME.uid,authorName:ME.name,text:t,ts:now()};
  if(commentReplyTo) c.parent=commentReplyTo;
  await db.ref('posts/'+commentsPostId+'/comments').push(c);
  $('#commentInput').value=''; commentReplyTo=null; $('#cReplyBar').style.display='none';
}
async function commentMenu(cid){
  const snap=await db.ref('posts/'+commentsPostId).get();
  const post=snap.val()||{};
  const isAuthor=post.author===ME.uid;
  const cm=(post.comments||{})[cid]||{};
  const mine=cm.author===ME.uid;
  const opts=[];
  if(isAuthor) opts.push({k:'📌',t:cm.pinned?'Открепить':'Закрепить комментарий',fn:()=>db.ref('posts/'+commentsPostId+'/comments/'+cid+'/pinned').set(!cm.pinned)});
  if(isAuthor) opts.push({k:'🎬',t:'Видео-ответ автора',fn:()=>videoReplyComment(cid)});
  opts.push({k:'↩',t:'Ответить',fn:()=>replyToComment(cid,cm.authorName||'')});
  if(isAuthor||mine) opts.push({k:'🗑',t:'Удалить',danger:true,fn:()=>db.ref('posts/'+commentsPostId+'/comments/'+cid).remove()});
  // простое меню через диалог
  const labels=opts.map((o,i)=>`<button class="btn ghost" style="text-align:left;${o.danger?'color:var(--danger)':''}" onclick="window.__cmAct(${i})">${o.k} ${o.t}</button>`).join('');
  openModal('Комментарий',labels||'<p>Нет действий</p>');
  window.__cmAct=i=>{ closeModal(); opts[i].fn(); setTimeout(()=>openComments(commentsPostId),200); };
}
function videoReplyComment(cid){
  pickFile('video/*',async f=>{ toast('Загрузка видео-ответа…'); const url=await uploadBlob(f,'comment-replies'); await db.ref('posts/'+commentsPostId+'/comments/'+cid+'/videoReply').set(url); toast('Видео-ответ добавлен 🎬'); openComments(commentsPostId); });
}

      if(taken.exists()) return toast('Этот никнейм уже занят 😕');
      await db.ref('nicknames/'+nick).set(ME.uid);
      await db.ref('users/'+ME.uid+'/nickname').set(nick);
      ME.nickname=nick;
    }
  }
  ME.name=n; ME.bio=bio;
  await db.ref('users/'+ME.uid).update({name:n,bio});
  localStorage.setItem('eggox_session',JSON.stringify({phoneKey,name:n}));
  closeModal(); renderChatList(); toast('Сохранено ✓');
}

async function googleTranslate(text, targetLang){
  // Uses the free Google Translate endpoint (no API key needed)
  const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl='
    + encodeURIComponent(targetLang) + '&dt=t&q=' + encodeURIComponent(text);
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('HTTP ' + resp.status);
  const data = await resp.json();
  // Response: [[["translated","original",null,null,1],...],...]
  return data[0].map(part => part[0]).join('');
}

let translatePopupEl = null;

function closeTranslatePopup(){
  if(translatePopupEl){ translatePopupEl.remove(); translatePopupEl = null; }
  document.removeEventListener('click', closeTranslatePopup, true);
}

function showTranslatePopup(text, x, y, onReplace){
  // onReplace = callback(translatedText) — if provided, shows "Replace" button
  closeTranslatePopup();
  const pop = document.createElement('div');
  pop.className = 'translate-popup';
  translatePopupEl = pop;

  let selectedLang = null;
  let translatedText = '';

  const render = () => {
    pop.innerHTML = `
      <div class="tp-title">🌐 Перевести ${onReplace ? 'сообщение' : 'на'}</div>
      <div class="tp-langs">
        ${TRANSLATE_LANGS.map(l =>
          `<button class="tp-lang${selectedLang===l.code?' on':''}" onclick="selectTranslateLang('${l.code}',${JSON.stringify(text)})">${l.label}</button>`
        ).join('')}
      </div>
      <div class="tp-result" id="tpResult" style="${translatedText?'display:block':'display:none'}">${esc(translatedText)}</div>
      <div class="tp-actions">
        ${translatedText && onReplace ? `<button class="btn mini" style="margin-top:0" onclick="doTranslateReplace()">${t('replace')}</button>` : ''}
        ${translatedText ? `<button class="btn ghost mini" style="margin-top:0" onclick="navigator.clipboard.writeText(${JSON.stringify(translatedText)});toast(t('copied')+' ✓')">📋 Копировать</button>` : ''}
        <button class="btn ghost mini" style="margin-top:0;margin-left:auto" onclick="closeTranslatePopup()">✕</button>
      </div>`;
  };

  window.selectTranslateLang = async (code, srcText) => {
    selectedLang = code;
    translatedText = '';
    render();
    const resultEl = document.getElementById('tpResult');
    if(resultEl){ resultEl.style.display='block'; resultEl.textContent = t('translating'); }
    try{
      const translated = await googleTranslate(srcText, code);
      translatedText = translated;
      window._lastTranslated = translated;
      render();
    } catch(e){
      if(resultEl){ resultEl.style.display='block'; resultEl.textContent = '❌ Ошибка: ' + e.message; }
    }
  };

  window.doTranslateReplace = () => {
    if(window._lastTranslated && onReplace){
      onReplace(window._lastTranslated);
      closeTranslatePopup();
    }
  };

  render();

  // Position the popup smartly
  document.body.appendChild(pop);
  const pw = pop.offsetWidth || 280;
  const ph = pop.offsetHeight || 300;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = Math.min(x, vw - pw - 12);
  let top = Math.min(y, vh - ph - 12);
  if(left < 8) left = 8;
  if(top < 8) top = 8;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  // Close on outside click (delayed so this click doesn't immediately close it)
  setTimeout(() => {
    document.addEventListener('click', (e) => {
      if(!pop.contains(e.target)) closeTranslatePopup();
    }, { once: false, capture: true });
  }, 200);
}

// Called from message context menu
function translateMessage(m, x, y){
  const text = m.text || '';
  if(!text.trim()) return toast('Нет текста для перевода');
  showTranslatePopup(text, x, y, null);
}

// Called from input bar translate button
function translateInputText(){
  const inp = document.getElementById('msgInput');
  if(!inp) return;
  const text = inp.value.trim();
  if(!text) return toast('Введите текст для перевода');
  // Get button position for popup placement
  const btn = document.getElementById('translateInputBtn');
  const rect = btn ? btn.getBoundingClientRect() : {left:80, bottom: window.innerHeight - 80};
  showTranslatePopup(text, rect.left, rect.top - 20, (translated) => {
    inp.value = translated;
    autoGrow(inp);
    inp.focus();
  });
}

function getStreakEmoji(days){
  if(days>=10) return '🐣'; // цыпленок
  if(days>=7)  return '🥚🔥💥'; // egg with fire + many cracks
  if(days>=5)  return '🥚🔥'; // egg with fire + first crack
  if(days>=2)  return '🥚✨'; // egg with thin yellow aura
  if(days>=1)  return '🥚'; // default egg
  return '';
}
function getStreakDisplay(days){
  if(days<=0) return '';
  if(days>=10){
    // row of chicks = floor(days/10)
    const chicks=Math.min(Math.floor(days/10),5);
    return '🐣'.repeat(chicks);
  }
  if(days>=7)  return '<span class="streak-d7">🥚</span><span class="streak-d5">🔥💥💥</span>';
  if(days>=5)  return '<span class="streak-d5">🥚🔥💥</span>';
  if(days>=2)  return '<span class="streak-d2">🥚✨</span>';
  return '<span class="streak-d1">🥚</span>';
}
async function updateStreak(otherUid){
  if(!ME||!otherUid||otherUid===ME.uid) return;
  const key=[ME.uid,otherUid].sort().join('_');
  const ref=db.ref('streaks/'+key);
  const snap=await ref.get(); const s=snap.val()||{};
  const today=new Date().toDateString();
  if(s.lastDate===today) return; // already counted today
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const newDays=(s.lastDate===yesterday)?(s.days||0)+1:1;
  await ref.set({days:newDays,lastDate:today,users:{[ME.uid]:true,[otherUid]:true}});
}
async function getStreak(otherUid){
  if(!ME||!otherUid||otherUid===ME.uid) return 0;
  const key=[ME.uid,otherUid].sort().join('_');
  const snap=await db.ref('streaks/'+key).get(); const s=snap.val()||{};
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(s.lastDate===today||s.lastDate===yesterday) return s.days||0;
  return 0;
}

async function runAIText(){
  const prompt = document.getElementById('aiPrompt').value.trim();
  if(!prompt) return toast('Введите текст запроса ✏️');
  
  const btn = document.getElementById('aiGenBtn');
  const resBox = document.getElementById('aiResult');
  
  btn.textContent = 'ИИ думает... ⏳';
  btn.disabled = true;
  resBox.style.display = 'none';
  
  try {
    console.log("Отправляю запрос...");
    const response = await fetch('https://eggox-production.up.railway.app/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt })
    });
    
    console.log("Ответ от сервера получен. Статус:", response.status);
    const data = await response.json();
    console.log("Данные от сервера:", data);
    
    resBox.style.display = 'block';
    
    // ПРИНУДИТЕЛЬНОЕ ОТОБРАЖЕНИЕ
    if(data.result) {
        resBox.textContent = data.result;
    } else {
        resBox.textContent = "Сервер ответил, но в ответе нет поля 'result'. Ответ был: " + JSON.stringify(data);
    }
    
  } catch(e) {
    console.error("Ошибка в функции:", e);
    resBox.style.display = 'block';
    resBox.innerHTML = '<b>Ошибка:</b> ' + e.message;
  }

  const snap=await db.ref('subscriptions/'+targetUid+'/followers/'+ME.uid).get();

  if(snap.exists()){
    btn.textContent=t('subscribed_btn'); btn.classList.add('subbed');

  }
}

async function toggleSubscribe(targetUid){
  const ref=db.ref('subscriptions/'+targetUid+'/followers/'+ME.uid);
  const snap=await ref.get();
  if(snap.exists()){
    await ref.remove();
    await db.ref('subscriptions/'+ME.uid+'/following/'+targetUid).remove();
    toast(t('unsubscribed'));
  } else {
    await ref.set(true);
    await db.ref('subscriptions/'+ME.uid+'/following/'+targetUid).set(true);
    toast(t('subscribed'));
  }
  checkSubscriptionStatus(targetUid);
  loadProfileStats(targetUid);
}

function switchProfileTab(tab, targetUid){
  document.getElementById('ptabPosts')?.classList.toggle('on',tab==='posts');
  document.getElementById('ptabStories')?.classList.toggle('on',tab==='stories');
  const content=document.getElementById('profileContent'); if(!content)return;

  if(tab==='posts'){
    content.innerHTML='<div class="profile-grid" id="profileGrid"><div style="padding:24px;text-align:center;color:var(--ink-soft);grid-column:1/-1">Загрузка…</div></div>';
    db.ref('posts').orderByChild('author').equalTo(targetUid).get().then(snap=>{
      const grid=document.getElementById('profileGrid'); if(!grid)return;
      const arr=Object.entries(snap.val()||{}).map(([id,v])=>({id,...v})).sort((a,b)=>b.ts-a.ts);
      if(!arr.length){ grid.innerHTML='<p style="padding:24px;text-align:center;color:var(--ink-soft);grid-column:1/-1">Постов пока нет</p>'; return; }
      grid.innerHTML='';
      arr.forEach(p=>{
        const item=document.createElement('div'); item.className='profile-grid-item';
        const likeCount=Object.keys(p.likes||{}).length;
        const commentCount=Object.keys(p.comments||{}).length;
        const views=p.views||0;
        if(p.media){
          if(p.media.video){
            item.innerHTML=`<video src="${p.media.url}" style="width:100%;height:100%;object-fit:cover"></video><span class="pgi-play">▶️</span>`;
          } else {
            item.innerHTML=`<img src="${p.media.url}">`;
          }
        } else {
          item.style.background='var(--green-100)';
          item.innerHTML=`<div style="padding:8px;font-size:13px;color:var(--ink);font-weight:700;word-break:break-word">${esc((p.title||p.desc||'').slice(0,60))}</div>`;
        }
        item.innerHTML+=`<div class="pgi-stats"><span>❤️ ${likeCount}</span><span>💬 ${commentCount}</span></div>`;
        item.onclick=()=>{ closeUserProfile(); switchTab('feed'); setTimeout(()=>{ const el=document.querySelector('[data-pid="'+p.id+'"]'); if(el)el.scrollIntoView({behavior:'smooth'}); },300); };
        grid.appendChild(item);
      });
    });
  } else {
    // Stories tab - show story thumbnails
    content.innerHTML='<div class="profile-grid" id="profileStoriesGrid"><div style="padding:24px;text-align:center;color:var(--ink-soft);grid-column:1/-1">Загрузка…</div></div>';
    const cutoff=Date.now()-24*3600*1000;
    db.ref('stories/'+targetUid).get().then(snap=>{
      const grid=document.getElementById('profileStoriesGrid'); if(!grid)return;
      const arr=Object.entries(snap.val()||{}).map(([id,v])=>({id,...v})).sort((a,b)=>b.ts-a.ts);
      if(!arr.length){ grid.innerHTML='<p style="padding:24px;text-align:center;color:var(--ink-soft);grid-column:1/-1">Историй пока нет</p>'; return; }
      grid.innerHTML='';
      arr.forEach(s=>{
        const item=document.createElement('div'); item.className='profile-grid-item';
        const isActive=s.ts>cutoff;
        if(s.video){
          item.innerHTML=`<video src="${s.url}" style="width:100%;height:100%;object-fit:cover"></video><span class="pgi-play">▶️</span>`;
        } else {
          item.innerHTML=`<img src="${s.url}" style="filter:${s.filterCss||'none'}">`;
        }
        const viewCount=Object.keys(s.views||{}).length;
        item.innerHTML+=`<div class="pgi-stats"><span>👁 ${viewCount}</span>${!isActive?'<span style="color:#aaa">⏰ истекло</span>':''}</div>`;
        if(!isActive) item.style.opacity='0.5';
        item.onclick=()=>{ if(isActive){ closeUserProfile(); openStoriesUser(targetUid); } else toast(t('story_expired')); };
        grid.appendChild(item);
      });
    });
  }
}

          <div style="font-weight:800;font-size:13px;color:#e67e22;margin:4px 0 2px">День 5</div>
          <div style="font-size:11px;color:#8a6d1f">Огонь +<br>трещины</div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:10px 6px;border:1px solid #ffe082">
          <div style="font-size:26px;filter:drop-shadow(0 0 12px rgba(255,50,0,1))">🥚</div>
          <div style="font-size:14px">🔥💥💥</div>
          <div style="font-weight:800;font-size:13px;color:#e67e22;margin:4px 0 2px">День 7</div>
          <div style="font-size:11px;color:#8a6d1f">Больше<br>трещин!</div>
        </div>
        <div style="background:#fff8e1;border-radius:14px;padding:10px 6px;border:2px solid #ffd600">
          <div style="font-size:32px">🐣</div>
          <div style="font-weight:800;font-size:13px;color:#e67e22;margin:4px 0 2px">День 10</div>
          <div style="font-size:11px;color:#8a6d1f">Цыплёнок<br>вылупился!</div>
        </div>
      </div>
      <div style="background:#fff;border-radius:12px;padding:10px 12px;font-size:13px;color:#8a6d1f;line-height:1.6">
        <b>Как работает стрик:</b> пишите друг другу каждый день — яйцо развивается. Пропустили день — стрик сбрасывается с начала.<br>
        <b>10+ дней:</b> за каждые 10 дней в профиле появляется новый 🐣 цыплёнок. Стройте коллекцию!
      </div>
    </div>

    <!-- MESSAGES GUIDE -->
    <div class="guide-section">
      <h4>💬 Сообщения</h4>
      <div class="guide-step"><div class="gs-num">1</div><div class="gs-text"><b>Новый чат:</b> нажмите ✏️ в правом нижнем углу экрана чатов</div></div>
      <div class="guide-step"><div class="gs-num">2</div><div class="gs-text"><b>Ответить:</b> зажмите сообщение → «Ответить»</div></div>
      <div class="guide-step"><div class="gs-num">3</div><div class="gs-text"><b>Перевести:</b> зажмите сообщение → «🌐 Перевести» → выберите язык</div></div>
      <div class="guide-step"><div class="gs-num">4</div><div class="gs-text"><b>Перевести свой текст:</b> напишите сообщение → появится 🌐 → нажмите → выберите язык → «Заменить»</div></div>
      <div class="guide-step"><div class="gs-num">5</div><div class="gs-text"><b>Голосовое:</b> зажмите 🎤 для записи голосового сообщения</div></div>
    </div>

    <div class="guide-section">
      <h4>📸 Истории</h4>
      <div class="guide-step"><div class="gs-num">1</div><div class="gs-text"><b>Добавить:</b> нажмите ＋ в строке историй вверху</div></div>
      <div class="guide-step"><div class="gs-num">2</div><div class="gs-text"><b>Просмотр:</b> нажмите аватар в строке историй</div></div>
      <div class="guide-step"><div class="gs-num">3</div><div class="gs-text"><b>Срок:</b> истории пропадают через 24 часа</div></div>
    </div>

    <div class="guide-section">
      <h4>📰 Лента</h4>
      <div class="guide-step"><div class="gs-num">1</div><div class="gs-text"><b>Новый пост:</b> нажмите ＋ в правом нижнем углу ленты</div></div>
      <div class="guide-step"><div class="gs-num">2</div><div class="gs-text"><b>Профиль автора:</b> нажмите на имя пользователя в посте</div></div>
      <div class="guide-step"><div class="gs-num">3</div><div class="gs-text"><b>Лайк:</b> нажмите ❤️ под постом</div></div>
    </div>

    <div class="guide-section">
      <h4>🌍 Язык</h4>
      <div class="guide-step"><div class="gs-num">1</div><div class="gs-text"><b>Сменить язык:</b> Настройки → 🌍 Язык приложения → выберите из 30 языков</div></div>
      <div class="guide-step"><div class="gs-num">2</div><div class="gs-text"><b>Перевод сообщений:</b> работает независимо от языка интерфейса</div></div>
    </div>

    <div class="guide-section">
      <h4>📞 Звонки</h4>
      <div class="guide-step"><div class="gs-num">1</div><div class="gs-text"><b>Аудиозвонок:</b> нажмите 📞 в шапке чата</div></div>
      <div class="guide-step"><div class="gs-num">2</div><div class="gs-text"><b>Видеозвонок:</b> нажмите 📹 в шапке чата</div></div>
    </div>

    <button class="btn ghost" style="margin-top:8px" onclick="openSettings()">← Назад</button>`);
}

window.addEventListener('beforeunload',()=>{ if(ME) db.ref('users/'+ME.uid).update({online:false,lastSeen:now()}); });
</script>
</body>
</html>
